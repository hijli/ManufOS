// ════════════════════════════════════════════════════
// COST VARIANCE
// ════════════════════════════════════════════════════
function renderCostVariance(){
  // Build per-project variance data
  const rows = DB.projects.map(p => {
    const bom = DB.boms.find(b=>b.id===p.bomId);
    const bomCost = bom ? calcBOMCost(bom.rows) : 0;
    const allPOs = p.pos || [];
    const budgetTotal = allPOs.reduce((a,po)=>a+po.total,0);
    const actualTotal = allPOs.reduce((a,po)=>{
      const ac = DB.poActualCosts[po.id];
      return a + (ac ? ac.actualCost : po.total);
    },0);
    const variance = actualTotal - budgetTotal;
    const bomVariance = budgetTotal - bomCost;
    const soTotal = (p.sos||[]).reduce((a,s)=>a+s.total,0);
    const estMargin = soTotal - actualTotal;
    const marginPct = soTotal > 0 ? ((estMargin/soTotal)*100).toFixed(1) : 0;
    return {p, bom, bomCost, budgetTotal, actualTotal, variance, bomVariance, soTotal, estMargin, marginPct};
  });

  const totalBOM = rows.reduce((a,r)=>a+r.bomCost,0);
  const totalBudget = rows.reduce((a,r)=>a+r.budgetTotal,0);
  const totalActual = rows.reduce((a,r)=>a+r.actualTotal,0);
  const totalVariance = totalActual - totalBudget;
  const totalSO = rows.reduce((a,r)=>a+r.soTotal,0);

  function varCell(v, pct=''){
    const cls = v > 0 ? 'color:var(--red)' : v < 0 ? 'color:var(--grn)' : 'color:var(--t3)';
    const sign = v > 0 ? '+' : '';
    return `<span style="font-family:var(--mono);font-weight:700;${cls}">${sign}$${Math.abs(v).toFixed(2)}${pct?` <span style="font-size:10px">(${sign}${pct}%)</span>`:''}</span>`;
  }

  return `
  <div class="kpi-grid kpi-4" style="margin-bottom:16px">
    <div class="kpi acc"><div class="kpi-label">BOM Standard Cost</div><div class="kpi-val" style="color:var(--acc)">$${(totalBOM/1000).toFixed(1)}K</div><div class="kpi-sub">Across ${DB.projects.length} projects</div></div>
    <div class="kpi grn"><div class="kpi-label">PO Budget Total</div><div class="kpi-val" style="color:var(--grn)">$${(totalBudget/1000).toFixed(1)}K</div><div class="kpi-sub">All purchase orders</div></div>
    <div class="kpi ${totalVariance>0?'red':'grn'}"><div class="kpi-label">Actual vs Budget</div><div class="kpi-val" style="color:${totalVariance>0?'var(--red)':'var(--grn)'}">${totalVariance>0?'+':''}$${Math.abs(totalVariance).toFixed(0)}</div><div class="kpi-sub ${totalVariance>0?'dn':'up'}">${totalVariance>0?'Over budget':'Under budget'}</div></div>
    <div class="kpi pur"><div class="kpi-label">Est. Total Margin</div><div class="kpi-val" style="color:var(--pur)">$${((totalSO-totalActual)/1000).toFixed(0)}K</div><div class="kpi-sub">Revenue minus actual costs</div></div>
  </div>
  <div class="page-pad" style="padding-top:0;display:flex;flex-direction:column;gap:14px">

    <!-- Project P&L table -->
    <div class="card">
      <div class="card-hd"><span class="card-title">Project P&L — Standard vs Actual</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Project</th><th>Customer</th>
          <th>BOM Std Cost</th><th>PO Budget</th><th>Actual Spend</th>
          <th>Budget Variance</th><th>SO Revenue</th><th>Est. Margin</th><th>Margin %</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>`<tr class="trow" onclick="nav('project',{projectId:'${r.p.id}'})">
            <td class="bold">${r.p.name}</td>
            <td style="font-size:11px">${r.p.customer}</td>
            <td class="mono">$${r.bomCost.toFixed(2)}</td>
            <td class="mono">$${r.budgetTotal.toLocaleString()}</td>
            <td class="mono" style="font-weight:600">$${r.actualTotal.toFixed(2)}</td>
            <td>${varCell(r.variance)}</td>
            <td class="money">$${r.soTotal.toLocaleString()}</td>
            <td>${varCell(r.estMargin)}</td>
            <td style="font-family:var(--mono);font-weight:700;color:${r.estMargin>=0?'var(--grn)':'var(--red)'}">${r.marginPct}%</td>
          </tr>`).join('')}
        </tbody>
        <tfoot>
          <tr style="background:var(--bg3);font-weight:700">
            <td colspan="2" style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--t2)">TOTALS</td>
            <td class="mono" style="padding:9px 12px">$${totalBOM.toFixed(2)}</td>
            <td class="mono" style="padding:9px 12px">$${totalBudget.toLocaleString()}</td>
            <td class="mono" style="padding:9px 12px;font-weight:700">$${totalActual.toFixed(2)}</td>
            <td style="padding:9px 12px">${varCell(totalVariance)}</td>
            <td class="money" style="padding:9px 12px">$${totalSO.toLocaleString()}</td>
            <td style="padding:9px 12px">${varCell(totalSO-totalActual)}</td>
            <td style="padding:9px 12px;font-family:var(--mono);font-weight:700;color:${totalSO-totalActual>=0?'var(--grn)':'var(--red)'}">${totalSO>0?((totalSO-totalActual)/totalSO*100).toFixed(1):0}%</td>
          </tr>
        </tfoot>
      </table></div>
    </div>

    <!-- Per-PO actual vs budget -->
    <div class="card">
      <div class="card-hd"><span class="card-title">Purchase Order — Budget vs Actual</span><button class="btn btn-ghost btn-sm" onclick="openEnterActualCost()">+ Enter Actual Cost</button></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>PO #</th><th>Project</th><th>Vendor</th><th>Items</th><th>Budget</th><th>Actual Cost</th><th>Variance $</th><th>Variance %</th><th>Status</th><th>Received</th></tr></thead>
        <tbody>${DB.projects.flatMap(p=>(p.pos||[]).map(po=>{
          const ac = DB.poActualCosts[po.id];
          const actual = ac ? ac.actualCost : null;
          const vr = actual != null ? actual - po.total : null;
          const vrPct = (actual != null && po.total > 0) ? ((vr/po.total)*100).toFixed(1) : null;
          return `<tr class="trow">
            <td class="mono">${po.id}</td>
            <td style="font-size:11px">${p.name}</td>
            <td class="bold">${po.vendor}</td>
            <td style="font-size:11px">${po.items}</td>
            <td class="mono">$${po.total.toLocaleString()}</td>
            <td class="mono" style="font-weight:${actual?'700':'400'}">${actual!=null?'$'+actual.toLocaleString():'<span style="color:var(--t3)">Pending</span>'}</td>
            <td>${vr!=null?varCell(vr,vrPct):'<span style="color:var(--t3)">—</span>'}</td>
            <td style="font-family:var(--mono);font-size:11px;color:${vrPct>0?'var(--red)':vrPct<0?'var(--grn)':'var(--t3)'}">${vrPct!=null?(vrPct>0?'+':'')+vrPct+'%':'—'}</td>
            <td>${poBadge(po.status)}</td>
            <td style="font-size:11px;color:var(--t3)">${ac?.receivedDate||'—'}</td>
          </tr>`;
        })).join('')}
        </tbody>
      </table></div>
    </div>

    <!-- BOM standard cost breakdown by project -->
    <div class="card">
      <div class="card-hd"><span class="card-title">BOM Standard Cost Breakdown</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Project / BOM</th><th>Component</th><th>SKU</th><th>Qty</th><th>Unit Cost</th><th>Ext Cost</th><th>% of BOM</th><th>Vendor</th></tr></thead>
        <tbody>${DB.projects.filter(p=>p.bomId).flatMap(p=>{
          const bom=DB.boms.find(b=>b.id===p.bomId);
          if(!bom)return[];
          const bomTotal=calcBOMCost(bom.rows);
          return flatBOMRows(bom.rows).map((row,i)=>{
            const ext=row.qty*row.cost;
            const pct=bomTotal>0?((ext/bomTotal)*100).toFixed(1):0;
            return `<tr class="trow">
              ${i===0?`<td rowspan="${flatBOMRows(bom.rows).length}" style="vertical-align:top;padding-top:12px;font-weight:600;color:var(--acc);font-size:12px;border-right:2px solid var(--b1)">${p.name}<br/><span style="font-size:10px;color:var(--t3);font-weight:400">${bom.name}</span></td>`:''}
              <td style="padding-left:${row._level*16+12}px;font-size:12px;font-weight:${row._level===0?600:400}">${row.name}</td>
              <td class="mono">${row.sku}</td>
              <td class="mono">${row.qty}</td>
              <td class="mono">$${row.cost.toFixed(2)}</td>
              <td class="money">$${ext.toFixed(2)}</td>
              <td>
                <div style="display:flex;align-items:center;gap:6px">
                  <div style="flex:1;max-width:60px"><div class="prog"><div class="prog-fill" style="width:${pct}%;background:var(--acc)"></div></div></div>
                  <span style="font-size:10px;font-family:var(--mono);color:var(--t3)">${pct}%</span>
                </div>
              </td>
              <td style="font-size:11px">${row.vendor}</td>
            </tr>`;
          });
        }).join('')}</tbody>
      </table></div>
    </div>
  </div>`;
}

function saveActualCost(){

  closeModal(); render(); toast('Actual cost recorded','grn');
}

      <div class="tbl-wrap"><table>

    </div>
  </div>`;

function saveInvTransaction(){
  const skuRaw=vv('f-isku').split('|');
  const sku=skuRaw[0],skuId=skuRaw[1],name=skuRaw[2],defaultCost=parseFloat(skuRaw[3])||0;
  const type=vv('f-itype');
  const qty=parseInt(vv('f-iqty'))||1;
  const unitCost=parseFloat(vv('f-iucost'))||defaultCost;
  const totalCost=type==='consume'?-(qty*unitCost):(qty*unitCost);

  // Update SKU on-hand
  const skuRec=DB.skus.find(s=>s.id===skuId);
  if(skuRec){
    if(type==='receive')skuRec.onHand+=qty;
    else if(type==='consume')skuRec.onHand=Math.max(0,skuRec.onHand-qty);
    else skuRec.onHand=Math.max(0,skuRec.onHand+(qty*(totalCost<0?-1:1)));
  }

  DB.invLog.unshift({
    id:'tx'+Date.now(),date:vv('f-idate'),skuId,sku,name,type,qty,unitCost,totalCost,
    projId:vv('f-iproj'),poId:vv('f-ipo'),note:vv('f-inote'),by:'J. Torres'
  });
  closeModal(); renderNav(); render(); toast('Transaction recorded','grn');
}

function approveCO(coId){
  const co = DB.changeOrders.find(c=>c.id===coId);
  if(!co){return;}
  co.status='Approved';
  co.approvedBy='J. Torres';
  co.approvedDate=today();
  // Apply BOM changes
  const bom=DB.boms.find(b=>b.id===co.bomId);
  if(bom){
    (co.changes||[]).forEach(ch=>{
      if(ch.type==='add'){
        bom.rows.push({
          id:'br'+Date.now(),skuId:'',sku:ch.sku||ch.name,name:ch.name,
          qty:ch.qty,uom:'EA',cost:ch.unitCost||0,vendor:'—',cat:'',
          partType:'INVENTORY',printFlag:'Print',notes:`Added via ${co.id}`,
          status:'Active',children:[]
        });
      } else if(ch.type==='remove'){
        bom.rows=bom.rows.filter(r=>r.sku!==ch.sku&&r.name!==ch.name);
      } else if(ch.type==='modify'&&ch.field==='vendor'){
        const row=bom.rows.find(r=>r.sku===ch.sku);
        if(row){row.vendor=ch.newVal;if(ch.unitCost)row.cost=ch.unitCost;}
      }
    });
  }
  renderNav(); render(); toast(`${coId} approved — BOM updated`,'grn');
}

function rejectCO(coId){
  const co=DB.changeOrders.find(c=>c.id===coId);
  if(co){co.status='Rejected';co.approvedBy='J. Torres';co.approvedDate=today();}
  renderNav(); render(); toast(`${coId} rejected`,'red');
}

function saveNewCO(){

  if(!title||!desc){toast('Title and description required','red');return;}
  const lines=[...document.querySelectorAll('.co-change-line')];
  const changes=lines.map(line=>({
    type:line.querySelector('.co-type').value,
    name:line.querySelector('.co-name').value,
    sku:line.querySelector('.co-sku').value,
    qty:parseInt(line.querySelector('.co-qty').value)||1,
    unitCost:parseFloat(line.querySelector('.co-cost').value)||0,
    extCost:(parseInt(line.querySelector('.co-qty').value)||1)*(parseFloat(line.querySelector('.co-cost').value)||0),
    reason:'',oldVal:'',newVal:'',field:'',
  })).filter(c=>c.name);

  const n=DB.changeOrders.length;
  DB.changeOrders.push({

// ════════════════════════════════════════════════════
// PLM — LIFECYCLE CONSTANTS
// ════════════════════════════════════════════════════
const LIFECYCLE_STATES=['Development','In Review','Released','Obsolete'];
const LC_COLORS={Development:'var(--acc)',  'In Review':'var(--amb)', Released:'var(--grn)', Obsolete:'var(--t3)'};
const LC_BG={Development:'var(--acc-light)','In Review':'var(--amb-light)',Released:'var(--grn-light)',Obsolete:'var(--bg4)'};
const LC_BORDER={Development:'var(--acc-mid)','In Review':'var(--amb-mid)',Released:'var(--grn-mid)',Obsolete:'var(--b2)'};
const PHASE_COLORS={Prototype:'var(--pur)',Pilot:'var(--amb)',Production:'var(--grn)'};
const ECO_COLORS={'Draft':'var(--t3)','In Review':'var(--amb)','Approved':'var(--acc)','Released':'var(--grn)','Rejected':'var(--red)','Cancelled':'var(--t3)'};

function lcBadge(state){
  const col=LC_COLORS[state]||'var(--t3)';
  const bg=LC_BG[state]||'var(--bg4)';
  const border=LC_BORDER[state]||'var(--b2)';
  return `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;color:${col};background:${bg};border:1px solid ${border}"><span style="width:6px;height:6px;border-radius:50%;background:${col}"></span>${state}</span>`;
}
function ecoStatusBadge(s){
  const m={Draft:'bk','In Review':'ba',Approved:'bb',Released:'bg',Rejected:'br',Cancelled:'bk'};
  return`<span class="badge ${m[s]||'bk'}">${s}</span>`;
}
function phaseBadge(p){const c={Prototype:'var(--pur)',Pilot:'var(--amb)',Production:'var(--grn)'};const bg={Prototype:'var(--pur-light)',Pilot:'var(--amb-light)',Production:'var(--grn-light)'};return`<span style="padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;color:${c[p]||'var(--t2)'};background:${bg[p]||'var(--bg4)'}">${p||'—'}</span>`;}

// ════════════════════════════════════════════════════
// PLM — PART MASTER
// ════════════════════════════════════════════════════
function renderPLM(){
  const parts=DB.parts||[];
  const released=parts.filter(p=>p.lifecycle==='Released').length;
  const inReview=parts.filter(p=>p.lifecycle==='In Review').length;
  const dev=parts.filter(p=>p.lifecycle==='Development').length;
  const obs=parts.filter(p=>p.lifecycle==='Obsolete').length;

  const tableRows=parts.map(part=>{
    const ecoCount=(DB.ecos||[]).filter(e=>e.affectedParts.includes(part.partNum)).length;
    return`<tr class="trow" onclick="openPartDetail('${part.id}')">
      <td><div style="font-weight:600;font-size:12px;font-family:var(--mono)">${part.partNum}</div></td>
      <td class="bold">${part.name}</td>
      <td><span class="tag">${part.category}</span></td>
      <td><span class="tag">${part.type}</span></td>
      <td style="text-align:center;font-weight:700;font-family:var(--mono);font-size:13px">${part.rev}</td>
      <td>${lcBadge(part.lifecycle)}</td>
      <td style="font-size:11px;color:var(--t3)">${part.owner}</td>
      <td style="font-size:11px">${part.releasedDate||'—'}</td>
      <td>${ecoCount?`<span style="background:var(--acc-light);color:var(--acc2);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700">${ecoCount} ECO${ecoCount>1?'s':''}</span>`:'<span style="color:var(--t4);font-size:11px">—</span>'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-xs" onclick="e=>{e.stopPropagation();openPartDetail('${part.id}')}">View</button>
        <button class="btn btn-ghost btn-xs" onclick="e=>{e.stopPropagation();openEditPart('${part.id}')}">Edit</button>
        <button class="btn btn-ghost btn-xs" onclick="e=>{e.stopPropagation();openLifecycleTransition('${part.id}')}">→ State</button>
      </td>
    </tr>`;
  }).join('');

  return`
  <!-- Lifecycle Pipeline Visual -->
  <div style="padding:16px 18px 0">
    <div style="display:flex;gap:0;align-items:stretch;border-radius:var(--r2);overflow:hidden;border:1px solid var(--b1)">
      ${LIFECYCLE_STATES.map((state,i)=>{
        const cnt=parts.filter(p=>p.lifecycle===state).length;
        const col=LC_COLORS[state];
        return`<div style="flex:1;padding:14px 16px;background:var(--bg2);border-right:${i<3?'1px solid var(--b1)':'none'};position:relative;overflow:hidden">
          <div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">${state}</div>
          <div style="font-size:28px;font-weight:700;font-family:var(--mono);color:${col}">${cnt}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:3px">${cnt===1?'part':'parts'}</div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:${col}"></div>
          ${i<3?`<div style="position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--t4);z-index:1">›</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- Part Table -->
  <div style="padding:14px 18px">
    <div class="card" style="padding:0">
      <div class="card-hd" style="padding:10px 14px">
        <span class="card-title">Part / Item Master (${parts.length} parts)</span>
        <div style="display:flex;gap:6px">
          <input id="plm-search" placeholder="Search parts…" oninput="filterPLM()" style="background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:5px 10px;font-size:12px;width:180px;font-family:var(--font)"/>
          <button class="btn btn-primary btn-sm" onclick="openNewPart()">+ New Part</button>
        </div>
      </div>
      <div class="tbl-wrap" id="plm-table">
        <table>
          <thead><tr><th>Part #</th><th>Name</th><th>Category</th><th>Type</th><th style="text-align:center">Rev</th><th>Lifecycle State</th><th>Owner</th><th>Released</th><th>ECOs</th><th>Actions</th></tr></thead>
          <tbody id="plm-tbody">${tableRows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function filterPLM(){
  const q=(document.getElementById('plm-search')?.value||'').toLowerCase();
  const tbody=document.getElementById('plm-tbody');if(!tbody)return;
  tbody.querySelectorAll('tr').forEach(row=>{
    row.style.display=row.textContent.toLowerCase().includes(q)?'':'none';
  });
}

function openPartDetail(partId){

  const bomUsage=(DB.bomVersions||[]).filter(bv=>bv.versions.some(v=>v.rows.some(r=>r.sku===part.partNum)));

  openModal(`Part: ${part.partNum} Rev ${part.rev}`,`
    <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap">

      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:32px;font-weight:700;font-family:var(--mono);color:var(--acc)">Rev ${part.rev}</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${[['Owner',part.owner],['Vendor',part.vendor],['Unit Cost',part.cost?'$'+part.cost.toFixed(2):'—'],['UOM',part.uom],['Created',part.createdDate],['Released',part.releasedDate||'Pending']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:var(--r)"><span style="font-size:11px;color:var(--t3)">${l}</span><span style="font-size:12px;font-weight:500;color:var(--t1)">${v}</span></div>`).join('')}
    </div>

    <!-- Revision History -->
    <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Revision History</div>
    <div style="display:flex;flex-direction:column;gap:0;border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;margin-bottom:14px">
      ${(part.revHistory||[]).map((r,i)=>`<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 13px;background:${r.state==='Released'?'var(--grn-light)':'var(--bg2)'};border-bottom:${i<(part.revHistory.length-1)?'1px solid var(--b1)':'none'}">
        <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:${r.state==='Released'?'var(--grn)':r.state==='Obsolete'?'var(--t4)':'var(--acc)'};min-width:28px;text-align:center">${r.rev}</div>
        <div style="flex:1">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:3px">${lcBadge(r.state)}<span style="font-size:10px;color:var(--t3)">${r.date} · ${r.by}</span></div>
          <div style="font-size:12px;color:var(--t2)">${r.note}</div>
        </div>
      </div>`).join('')}
    </div>

    <!-- Related ECOs -->
    ${relECOs.length?`<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Related ECOs</div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:14px">
      ${relECOs.map(eco=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--bg3);border-radius:var(--r);cursor:pointer" onclick="closeModal();nav('eco');setTimeout(()=>openECODetail('${eco.id}'),100)">
        <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--acc)">${eco.id}</span>
        <span style="flex:1;font-size:12px">${eco.title}</span>
        ${ecoStatusBadge(eco.status)}
      </div>`).join('')}
    </div>`:''}

    <!-- Lifecycle Transition -->
    <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Lifecycle Transition</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      ${LIFECYCLE_STATES.filter(s=>s!==part.lifecycle).map(s=>`<button class="btn btn-ghost btn-sm" style="border-color:${LC_COLORS[s]};color:${LC_COLORS[s]}" onclick="transitionPartState('${part.id}','${s}')">→ ${s}</button>`).join('')}
    </div>`,
  `<button class="btn btn-ghost" onclick="closeModal()">Close</button>
   <button class="btn btn-primary" onclick="closeModal();openEditPart('${partId}')">Edit Part</button>`);
}

function transitionPartState(partId, newState){
  const part=(DB.parts||[]).find(p=>p.id===partId);if(!part)return;
  const oldState=part.lifecycle;
  part.lifecycle=newState;
  if(newState==='Released'&&!part.releasedDate)part.releasedDate=today();
  // Add to rev history
  part.revHistory.push({rev:part.rev,date:today(),by:'J. Torres',state:newState,note:`State transitioned from ${oldState} to ${newState}`});
  closeModal();render();toast(`${part.partNum} → ${newState}`,'grn');
}

  const part=(DB.parts||[]).find(p=>p.id===partId);if(!part)return;
  openModal('Lifecycle Transition: '+part.partNum,`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div><div style="font-size:14px;font-weight:700">${part.name}</div><div style="font-size:11px;color:var(--t3)">${part.partNum} Rev ${part.rev}</div></div>

    <!-- State machine visual -->
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:18px;padding:12px;background:var(--bg3);border-radius:var(--r2)">
      ${LIFECYCLE_STATES.map((s,i)=>`<div style="flex:1;text-align:center">
        <div style="padding:7px 4px;border-radius:var(--r);border:2px solid ${s===part.lifecycle?LC_COLORS[s]:'var(--b1)'};background:${s===part.lifecycle?LC_BG[s]:'var(--bg2)'};font-size:10px;font-weight:700;color:${LC_COLORS[s]}">${s}</div>

function saveLCTransition(partId){
  const part=(DB.parts||[]).find(p=>p.id===partId);if(!part)return;
  const newState=vv('flt-state'),note=vv('flt-note'),newRev=vv('flt-rev');
  if(!note){toast('Transition note required','red');return;}
  if(newState===part.lifecycle){toast('Select a different state','red');return;}
  if(newRev)part.rev=newRev;
  part.lifecycle=newState;
  if(newState==='Released'&&!part.releasedDate)part.releasedDate=today();
  part.revHistory.push({rev:part.rev,date:today(),by:'J. Torres',state:newState,note});
  closeModal();render();toast(`${part.partNum} → ${newState}`,'grn');
}

function openBOMVerDiff(bvId,oldVerId,newVerId){
  const bv=(DB.bomVersions||[]).find(b=>b.id===bvId);if(!bv)return;
  const oldV=bv.versions.find(v=>v.verId===oldVerId);
  const newV=bv.versions.find(v=>v.verId===newVerId);
  if(!oldV||!newV)return;

  const oldSkus=new Map(oldV.rows.map(r=>[r.sku,r]));
  const newSkus=new Map(newV.rows.map(r=>[r.sku,r]));
  const allSkus=new Set([...oldSkus.keys(),...newSkus.keys()]);
  const diffRows=[];
  allSkus.forEach(sku=>{
    const o=oldSkus.get(sku),n=newSkus.get(sku);
    if(!o&&n){diffRows.push({type:'added',row:n});}
    else if(o&&!n){diffRows.push({type:'removed',row:o});}
    else if(o&&n&&(o.qty!==n.qty||o.vendor!==n.vendor||o.cost!==n.cost)){diffRows.push({type:'modified',old:o,row:n});}
  });
  const unchanged=([...allSkus].length-diffRows.length);

  openModal(`BOM Diff: Rev ${oldV.rev} → Rev ${newV.rev}`,`
    <div style="display:flex;gap:9px;align-items:center;margin-bottom:14px">
      <div style="padding:6px 12px;background:var(--bg3);border-radius:var(--r);font-size:11px"><span style="color:var(--t3)">From:</span> <strong>Rev ${oldV.rev}</strong> ${phaseBadge(oldV.phase)}</div>
      <span style="color:var(--t3);font-size:16px">→</span>
      <div style="padding:6px 12px;background:var(--acc-light);border-radius:var(--r);font-size:11px"><span style="color:var(--t3)">To:</span> <strong>Rev ${newV.rev}</strong> ${phaseBadge(newV.phase)}</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:13px">
      <span style="background:var(--grn-light);color:var(--grn2);padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700">+ ${diffRows.filter(d=>d.type==='added').length} added</span>
      <span style="background:var(--red-light);color:var(--red2);padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700">− ${diffRows.filter(d=>d.type==='removed').length} removed</span>
      <span style="background:var(--amb-light);color:var(--amb2);padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700">~ ${diffRows.filter(d=>d.type==='modified').length} modified</span>
      <span style="background:var(--bg4);color:var(--t2);padding:3px 9px;border-radius:4px;font-size:11px">= ${unchanged} unchanged</span>
    </div>
    ${diffRows.length?`<div style="display:flex;flex-direction:column;gap:6px">
      ${diffRows.map(d=>{
        if(d.type==='added')return`<div style="display:flex;gap:9px;align-items:center;padding:9px 11px;background:var(--grn-light);border-radius:var(--r);border-left:3px solid var(--grn)"><span style="font-size:12px;font-weight:700;color:var(--grn2);flex-shrink:0">+ ADD</span><span style="font-family:var(--mono);font-size:11px;flex-shrink:0;color:var(--t3)">${d.row.sku}</span><span style="flex:1;font-weight:600;font-size:12px">${d.row.name}</span><span style="font-size:11px;color:var(--t2)">Qty: ${d.row.qty} · $${d.row.cost.toFixed(2)} · ${d.row.vendor}</span></div>`;
        if(d.type==='removed')return`<div style="display:flex;gap:9px;align-items:center;padding:9px 11px;background:var(--red-light);border-radius:var(--r);border-left:3px solid var(--red)"><span style="font-size:12px;font-weight:700;color:var(--red2);flex-shrink:0">− REM</span><span style="font-family:var(--mono);font-size:11px;flex-shrink:0;color:var(--t3)">${d.row.sku}</span><span style="flex:1;font-weight:600;font-size:12px;text-decoration:line-through;opacity:.6">${d.row.name}</span></div>`;
        // modified
        const changes=[];
        if(d.old.qty!==d.row.qty)changes.push(`Qty: <span style="text-decoration:line-through;color:var(--t3)">${d.old.qty}</span> → <strong>${d.row.qty}</strong>`);
        if(d.old.cost!==d.row.cost)changes.push(`Cost: <span style="text-decoration:line-through;color:var(--t3)">$${d.old.cost.toFixed(2)}</span> → <strong>$${d.row.cost.toFixed(2)}</strong>`);
        if(d.old.vendor!==d.row.vendor)changes.push(`Vendor: <span style="text-decoration:line-through;color:var(--t3)">${d.old.vendor}</span> → <strong>${d.row.vendor}</strong>`);
        return`<div style="display:flex;gap:9px;align-items:flex-start;padding:9px 11px;background:var(--amb-light);border-radius:var(--r);border-left:3px solid var(--amb)"><span style="font-size:12px;font-weight:700;color:var(--amb2);flex-shrink:0">~ MOD</span><span style="font-family:var(--mono);font-size:11px;flex-shrink:0;color:var(--t3);padding-top:1px">${d.row.sku}</span><div style="flex:1"><div style="font-weight:600;font-size:12px;margin-bottom:3px">${d.row.name}</div><div style="font-size:11px;color:var(--t2)">${changes.join(' · ')}</div></div></div>`;
      }).join('')}
    </div>`:`<div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">No changes — identical BOMs</div>`}`,
  `<button class="btn btn-ghost" onclick="closeModal()">Close</button>`);
}

function saveNewBOMRevision(bvId){
  const bv=(DB.bomVersions||[]).find(b=>b.id===bvId);if(!bv)return;
  const rev=vv('fnbr-rev'),note=vv('fnbr-note');
  if(!rev||!note){toast('Revision and note required','red');return;}
  const lastVer=bv.versions[bv.versions.length-1];

  if(status==='Released')bv.versions.forEach(v=>{if(v.status==='Released')v.status='Obsolete';});
  bv.versions.push({verId:bvId+'-'+rev,rev,phase:vv('fnbr-phase'),status,date:today(),by:'J. Torres',note,ecoId:vv('fnbr-eco'),rows:JSON.parse(JSON.stringify(lastVer.rows))});
  closeModal();render();toast(`Rev ${rev} created`,'grn');
}

        <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap">
          <div style="flex:1">
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:5px;flex-wrap:wrap">
              <span style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--acc)">${eco.id}</span>
              ${ecoStatusBadge(eco.status)}
              <span class="badge ${eco.priority==='High'?'br':eco.priority==='Medium'?'ba':'bk'}">${eco.priority}</span>
              <span class="tag">${eco.type}</span>
            </div>
            <div style="font-size:16px;font-weight:700;margin-bottom:5px">${eco.title}</div>
            <div style="font-size:11px;color:var(--t3)">Initiated by ${eco.initiatedBy} on ${eco.initiatedDate} · Target BOM: <strong style="font-family:var(--mono)">${eco.targetBOM}</strong> Rev <strong>${eco.targetRev}</strong></div>
          </div>
          <div style="text-align:center;background:var(--bg3);border-radius:var(--r2);padding:12px 18px;flex-shrink:0">
            <div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Cost Delta</div>
            <div style="font-size:24px;font-weight:700;font-family:var(--mono);color:${totalCostDelta>0?'var(--red)':totalCostDelta<0?'var(--grn)':'var(--t3)'}">${totalCostDelta>0?'+':''}$${totalCostDelta.toFixed(2)}</div>
            <div style="font-size:10px;color:var(--t3);margin-top:2px">per unit</div>
          </div>
        </div>
        <div style="background:var(--bg3);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--t2);line-height:1.7">${eco.desc}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
      <!-- Workflow -->
      <div class="card">
        <div class="card-hd">
          <span class="card-title">Approval Workflow</span>
          <div style="display:flex;align-items:center;gap:7px">
            <div style="width:80px;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--grn);border-radius:3px"></div></div>
            <span style="font-size:10px;font-family:var(--mono);color:var(--t3)">${stepsDone}/${eco.workflow.length}</span>
          </div>
        </div>
        <div style="padding:0">
          ${eco.workflow.map((step,i)=>{
            const isDone=step.status==='Complete';const isPending=step.status==='Pending';
            const isNext=isPending&&eco.workflow.slice(0,i).every(s=>s.status==='Complete');
            return`<div style="display:flex;gap:11px;padding:13px 16px;border-bottom:${i<eco.workflow.length-1?'1px solid var(--b1)':'none'};background:${isNext?'var(--acc-light)':'var(--bg2)'}">
              <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px">
                <div style="width:26px;height:26px;border-radius:50%;background:${isDone?'var(--grn)':isNext?'var(--acc)':'var(--bg4)'};border:2px solid ${isDone?'var(--grn-mid)':isNext?'var(--acc-mid)':'var(--b2)'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${isDone||isNext?'#fff':'var(--t3)'}">
                  ${isDone?'✓':i+1}
                </div>
                ${i<eco.workflow.length-1?`<div style="width:2px;height:12px;background:${isDone?'var(--grn-mid)':'var(--b1)'}"></div>`:''}
              </div>
              <div style="flex:1">
                <div style="display:flex;gap:7px;align-items:center;margin-bottom:3px">
                  <span style="font-size:12px;font-weight:700;color:${isDone?'var(--grn)':isNext?'var(--acc)':'var(--t2)'}">${step.step}</span>
                  <span class="badge ${isDone?'bg':isNext?'bb':'bk'}">${step.status}</span>
                  ${isNext?'<span style="font-size:10px;font-weight:700;color:var(--acc)">← Next</span>':''}
                </div>
                ${isDone?`<div style="font-size:11px;color:var(--t3);margin-bottom:3px">${step.completedBy} · ${step.date}</div>`:''}
                ${step.comment?`<div style="font-size:12px;color:var(--t2);line-height:1.5;background:${isDone?'var(--grn-light)':isNext?'var(--acc-light)':'var(--bg3)'};padding:6px 8px;border-radius:var(--r);margin-top:4px">${step.comment}</div>`:''}
                ${isNext&&eco.status!=='Released'&&eco.status!=='Rejected'?`<div style="margin-top:8px;display:flex;gap:5px">
                  <button class="btn btn-primary btn-xs" onclick="completeECOStep('${eco.id}',${i})">✓ Complete Step</button>
                  <button class="btn btn-danger btn-xs" onclick="rejectECO('${eco.id}')">✗ Reject ECO</button>
                </div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- BOM Changes + Attachments -->
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <div class="card-hd"><span class="card-title">BOM Changes (${eco.changes.length})</span></div>
          <div style="padding:12px 14px;display:flex;flex-direction:column;gap:6px">
            ${eco.changes.map(ch=>{
              const typeColor={add:'var(--grn2)',remove:'var(--red2)',modify:'var(--amb2)'}[ch.type];
              const typeBg={add:'var(--grn-light)',remove:'var(--red-light)',modify:'var(--amb-light)'}[ch.type];
              const typeLabel={add:'+ ADD',remove:'− REMOVE',modify:'~ MODIFY'}[ch.type];
              return`<div style="display:flex;gap:8px;align-items:flex-start;padding:9px 11px;background:${typeBg};border-radius:var(--r);border-left:3px solid ${typeColor}">
                <span style="font-size:11px;font-weight:700;color:${typeColor};flex-shrink:0;min-width:60px">${typeLabel}</span>
                <div style="flex:1">
                  <div style="font-size:12px;font-weight:600;margin-bottom:2px"><span style="font-family:var(--mono);font-size:10px;color:var(--t3)">${ch.sku}</span> ${ch.name}</div>
                  ${ch.type==='modify'?`<div style="font-size:11px;color:var(--t2)">${ch.field}: <span style="text-decoration:line-through;color:var(--t3)">${ch.from}</span> → <strong>${ch.to}</strong></div>`:
                  ch.type==='add'?`<div style="font-size:11px;color:var(--t2)">Qty: ${ch.qty} · $${ch.cost?.toFixed(2)||'0.00'}/ea</div>`:''}
                </div>
                ${ch.costDelta!==undefined?`<span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${ch.costDelta>0?'var(--red)':ch.costDelta<0?'var(--grn)':'var(--t3)'};flex-shrink:0">${ch.costDelta>0?'+':''}$${ch.costDelta.toFixed(2)}</span>`:''}
              </div>`;}).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-hd"><span class="card-title">Attachments</span></div>
          <div style="padding:12px 14px;display:flex;flex-direction:column;gap:6px">
            ${(eco.attachments||[]).map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:var(--r);cursor:pointer">
              <span style="font-size:16px">📄</span>
              <span style="font-size:12px;font-weight:500;color:var(--acc);flex:1">${a}</span>
              <button class="btn btn-ghost btn-xs">View</button>
            </div>`).join('')}
            ${!(eco.attachments||[]).length?`<div style="color:var(--t3);font-size:12px;text-align:center;padding:12px">No attachments</div>`:''}
            <button class="btn btn-ghost btn-sm" style="margin-top:4px" onclick="toast('File upload coming soon','acc')">+ Attach File</button>
          </div>
        </div>
        <!-- Affected Parts -->
        <div class="card">
          <div class="card-hd"><span class="card-title">Affected Parts</span></div>
          <div style="padding:12px 14px;display:flex;flex-wrap:wrap;gap:6px">
            ${eco.affectedParts.map(pn=>{const p=(DB.parts||[]).find(x=>x.partNum===pn);return`<div style="padding:5px 10px;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);cursor:pointer" onclick="closeModal&&closeModal();nav('plm');setTimeout(()=>openPartDetail('${p?.id||''}'),100)"><div style="font-family:var(--mono);font-size:10px;color:var(--acc)">${pn}</div>${p?`<div style="font-size:11px;color:var(--t2)">${p.name}</div><div>${lcBadge(p.lifecycle)}</div>`:'<div style="font-size:11px;color:var(--t3)">Unknown</div>'}</div>`;}).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function completeECOStep(ecoId, stepIdx){
  const eco=(DB.ecos||[]).find(e=>e.id===ecoId);if(!eco)return;
  const step=eco.workflow[stepIdx];if(!step)return;
  step.status='Complete';step.completedBy='J. Torres';step.date=today();
  step.comment=step.comment||'Approved';
  // Check if all steps done
  if(eco.workflow.every(w=>w.status==='Complete')){eco.status='Released';toast('ECO Released! All steps complete.','grn');}
  else{eco.status='In Review';toast(`Step "${step.step}" completed`,'grn');}
  renderNav();renderECODetail();
}

function advanceECOWorkflow(ecoId){
  const eco=(DB.ecos||[]).find(e=>e.id===ecoId);if(!eco)return;
  const nextIdx=eco.workflow.findIndex(w=>w.status==='Pending');
  if(nextIdx<0){toast('All steps complete','grn');return;}
  completeECOStep(ecoId,nextIdx);
}

function rejectECO(ecoId){
  cfm('Reject ECO?','This will mark the ECO as Rejected and stop the workflow.',()=>{
    const eco=(DB.ecos||[]).find(e=>e.id===ecoId);if(!eco)return;
    eco.status='Rejected';
    renderNav();renderECODetail();toast('ECO rejected','red');
  });
}

function openNewECO(){
  openModal('New Engineering Change Order',`
    <div class="fgrid"><div class="fg"><label>ECO Title *</label><input id="feco-t" placeholder="Add heatsink to production BOM"/></div>
    <div class="fg"><label>Type</label><select id="feco-ty"><option>Design Change</option><option>Production Release</option><option>Approved Vendor List</option><option>Cost Reduction</option><option>Regulatory</option><option>Field Fix</option></select></div></div>
    <div class="fgrid"><div class="fg"><label>Priority</label><select id="feco-pr"><option>High</option><option selected>Medium</option><option>Low</option></select></div>
    <div class="fg"><label>Initiated By</label><input id="feco-by" value="J. Torres" placeholder="Your name"/></div></div>
    <div class="fgrid"><div class="fg"><label>Target BOM Part #</label><input id="feco-bom" placeholder="SRVR-1U-COMP-001"/></div>
    <div class="fg"><label>Target Revision</label><input id="feco-rev" placeholder="D"/></div></div>
    <div class="fg fgrid one"><label>Description / Justification *</label><textarea id="feco-d" placeholder="Describe what is changing and why…" rows="3"></textarea></div>
    <div class="fg fgrid one"><label>Affected Part Numbers (comma separated)</label><input id="feco-ap" placeholder="CTRL-PCB-003, HOUS-ALU-007"/></div>
    <div class="fg fgrid one"><label>BOM Changes (one per line: SKU | Name | Qty | Cost | add/remove/modify)</label><textarea id="feco-ch" placeholder="HEAT-SINK-005 | Heatsink AL 40mm | 1 | 2.40 | add" rows="3"></textarea></div>`,
  `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="saveNewECO()">Submit ECO</button>`);
}

function saveNewECO(){
  const title=vv('feco-t'),desc=vv('feco-d');
  if(!title||!desc){toast('Title and description required','red');return;}
  const n=(DB.ecos||[]).length;
  const ecoId='ECO-'+String(n+4).padStart(3,'0');
  const changes=(vv('feco-ch')||'').split('\n').filter(l=>l.trim()).map(line=>{
    const pts=line.split('|').map(s=>s.trim());
    const type=pts[4]||'add';
    return type==='modify'?{type,sku:pts[0],name:pts[1],field:'qty',from:'—',to:pts[2],costDelta:parseFloat(pts[3])||0}:{type,sku:pts[0],name:pts[1],qty:parseInt(pts[2])||1,cost:parseFloat(pts[3])||0,costDelta:parseFloat(pts[3])||0};
  });
  const affectedParts=(vv('feco-ap')||'').split(',').map(s=>s.trim()).filter(Boolean);
  DB.ecos=DB.ecos||[];
  DB.ecos.push({id:ecoId,title,status:'In Review',priority:vv('feco-pr'),type:vv('feco-ty'),initiatedBy:vv('feco-by')||'J. Torres',initiatedDate:today(),targetBOM:vv('feco-bom'),targetRev:vv('feco-rev')||'?',affectedParts,desc,workflow:[
    {step:'Initiation',completedBy:'J. Torres',date:today(),status:'Complete',comment:'ECO created.'},
    {step:'Engineering Review',completedBy:'',date:'',status:'Pending',comment:''},
    {step:'Cost Review',completedBy:'',date:'',status:'Pending',comment:''},
    {step:'Release',completedBy:'',date:'',status:'Pending',comment:''},
  ],changes,costDelta:changes.reduce((a,c)=>a+(c.costDelta||0),0),attachments:[]});
  closeModal();nav('eco');toast('ECO submitted — in review','grn');
}

function openEditECO(ecoId){toast('Edit ECO — full form coming','acc');}

// ════════════════════════════════════════════════════
// PROJECT BOM PHASES — RFQ / PILOT / PRODUCTION
// Each project BOM can be at different phases with separate row sets
// ════════════════════════════════════════════════════

// Ensure each project has a bomPhases structure
function ensureBOMPhases(p) {
  if (!p.bomPhases) {
    // Initialize from existing BOM rows
    const bom = DB.boms.find(b => b.id === p.bomId);
    const baseRows = bom ? JSON.parse(JSON.stringify(flatBOMRows(bom.rows))).map(r => ({
      sku: r.sku, name: r.name, qty: r.qty, uom: r.uom, cost: r.cost,
      vendor: r.vendor, notes: r.notes || '', include: true
    })) : [];
    p.bomPhases = {
      activePhase: 'Production',
      rfq:        { rows: JSON.parse(JSON.stringify(baseRows)), note: 'RFQ BOM — items to request quotes for', locked: false },
      pilot:      { rows: JSON.parse(JSON.stringify(baseRows)), note: 'Pilot BOM — pre-production build', locked: false },
      production: { rows: JSON.parse(JSON.stringify(baseRows)), note: 'Production BOM — released for manufacture', locked: false },
    };
  }
  return p.bomPhases;
}

function renderProjectBOMPhases(p) {
  const phases = ensureBOMPhases(p);
  const active = phases.activePhase || 'Production';
  const phaseData = phases[active.toLowerCase()];
  const rows = phaseData ? phaseData.rows : [];
  const totalCost = rows.filter(r=>r.include!==false).reduce((a,r) => a + r.qty * r.cost, 0);
  const phaseColors = { RFQ: 'var(--amb)', Pilot: 'var(--acc)', Production: 'var(--grn)' };
  const phaseDescs = { RFQ: 'Items to send for quotes — may be incomplete', Pilot: 'Pre-production build BOM — under validation', Production: 'Released production BOM — locked after approval' };

  return `
  <div style="flex:1;overflow:auto;display:flex;flex-direction:column">
    <!-- Phase selector -->
    <div style="padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;gap:8px;align-items:center;flex-shrink:0">
      <span style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px">BOM Phase:</span>
      ${['RFQ','Pilot','Production'].map(ph => {
        const col = phaseColors[ph];
        const isActive = active === ph;
        return `<button onclick="setProjectBOMPhase('${p.id}','${ph}')" style="padding:5px 14px;border-radius:20px;border:2px solid ${isActive?col:'var(--b2)'};background:${isActive?col:'transparent'};color:${isActive?'#fff':col};font-size:11px;font-weight:700;cursor:pointer;transition:all .15s">${ph}</button>`;
      }).join('')}
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="copyPhaseRows('${p.id}')">↓ Copy from Production</button>
        <button class="btn btn-primary btn-sm" onclick="addBOMPhaseRow('${p.id}')">+ Add Row</button>
      </div>
    </div>
    <!-- Phase info banner -->
    <div style="padding:7px 14px;background:${phaseColors[active]}15;border-bottom:1px solid ${phaseColors[active]}40;display:flex;gap:8px;align-items:center;flex-shrink:0">
      <span style="font-size:11px;color:${phaseColors[active]};font-weight:600">📋 ${active} Phase</span>
      <span style="font-size:11px;color:var(--t2)">${phaseDescs[active]}</span>
      <span style="margin-left:auto;font-size:11px;font-family:var(--mono);font-weight:700;color:var(--grn)">$${totalCost.toFixed(2)}</span>
      ${phaseData && phaseData.note ? `<span style="font-size:11px;color:var(--t3);font-style:italic">${phaseData.note}</span>` : ''}
    </div>
    <!-- BOM rows for this phase -->
    <div style="flex:1;overflow:auto">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="width:30px;background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:center;border-bottom:2px solid var(--b1)">✓</th>
          <th style="background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:left;border-bottom:2px solid var(--b1)">SKU</th>
          <th style="background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:left;border-bottom:2px solid var(--b1)">Description</th>
          <th style="width:60px;background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:left;border-bottom:2px solid var(--b1)">Qty</th>
          <th style="width:80px;background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:left;border-bottom:2px solid var(--b1)">Unit $</th>
          <th style="width:85px;background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:left;border-bottom:2px solid var(--b1)">Ext $</th>
          <th style="background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:left;border-bottom:2px solid var(--b1)">Vendor</th>
          <th style="background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:left;border-bottom:2px solid var(--b1)">Notes</th>
          <th style="width:60px;background:var(--bg3);padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--t3);text-align:left;border-bottom:2px solid var(--b1)"></th>
        </tr></thead>
        <tbody>
          ${rows.map((row, i) => {
            const included = row.include !== false;
            return `<tr style="background:${included?'var(--bg2)':'var(--bg3)'}">
              <td style="padding:6px 10px;text-align:center;border-bottom:1px solid var(--b1)">
                <input type="checkbox" ${included?'checked':''} onchange="togglePhaseRow('${p.id}','${active}',${i},this.checked)" style="width:14px;height:14px;accent-color:${phaseColors[active]}"/>
              </td>
              <td style="padding:6px 10px;font-family:var(--mono);font-size:10px;border-bottom:1px solid var(--b1);color:${included?'var(--t1)':'var(--t3)'}">${row.sku}</td>
              <td style="padding:6px 10px;font-size:12px;font-weight:600;border-bottom:1px solid var(--b1);color:${included?'var(--t1)':'var(--t3)'};text-decoration:${included?'none':'line-through'}">${row.name}</td>
              <td style="padding:6px 10px;border-bottom:1px solid var(--b1)"><input value="${row.qty}" type="number" min="0" step="any" onchange="updPhaseRow('${p.id}','${active}',${i},'qty',this.value)" style="width:50px;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:11px;color:${included?'var(--t1)':'var(--t3)'}"/></td>
              <td style="padding:6px 10px;border-bottom:1px solid var(--b1)"><input value="${row.cost.toFixed(2)}" type="number" step="0.01" onchange="updPhaseRow('${p.id}','${active}',${i},'cost',this.value)" style="width:65px;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:11px;color:${included?'var(--grn)':'var(--t3)'}"/></td>
              <td style="padding:6px 10px;font-family:var(--mono);font-size:12px;font-weight:600;color:${included?'var(--grn)':'var(--t3)'};border-bottom:1px solid var(--b1)">$${(row.qty*row.cost).toFixed(2)}</td>
              <td style="padding:6px 10px;border-bottom:1px solid var(--b1)"><input value="${row.vendor||''}" onchange="updPhaseRow('${p.id}','${active}',${i},'vendor',this.value)" style="width:100%;background:transparent;border:none;outline:none;font-size:11px;color:var(--t2)"/></td>
              <td style="padding:6px 10px;border-bottom:1px solid var(--b1)"><input value="${row.notes||''}" onchange="updPhaseRow('${p.id}','${active}',${i},'notes',this.value)" placeholder="Notes…" style="width:100%;background:transparent;border:none;outline:none;font-size:11px;color:var(--t3)"/></td>
              <td style="padding:4px 7px;border-bottom:1px solid var(--b1)">
                <button class="btn btn-ghost btn-xs" onclick="removePhaseRow('${p.id}','${active}',${i})" style="padding:2px 5px;font-size:10px">✕</button>
              </td>
            </tr>`;
          }).join('')}
          ${rows.length===0?`<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--t3)">No rows in this phase BOM. <span style="color:var(--acc);cursor:pointer" onclick="copyPhaseRows('${p.id}')">Copy from Production BOM</span> or <span style="color:var(--acc);cursor:pointer" onclick="addBOMPhaseRow('${p.id}')">add manually</span>.</td></tr>`:''}
        </tbody>
      </table>
      <div style="background:var(--nav);padding:8px 11px;display:flex;font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.4)">
        <span style="flex:1;color:rgba(255,255,255,.6);font-weight:600">${active.toUpperCase()} BOM TOTAL — ${rows.filter(r=>r.include!==false).length} active / ${rows.length} items</span>
        <span style="color:#4ade80;font-weight:700">$${totalCost.toFixed(2)}</span>
      </div>
    </div>
    <!-- Phase actions -->
    <div style="padding:8px 14px;border-top:1px solid var(--b1);background:var(--bg2);display:flex;gap:7px;align-items:center;flex-shrink:0">
      <button class="btn btn-ghost btn-sm" onclick="exportPhaseCSV('${p.id}','${active}')">↓ Export ${active} BOM CSV</button>
      ${active==='RFQ'?`<button class="btn btn-primary btn-sm" onclick="createRFQsFromPhase('${p.id}')">→ Create RFQs from this BOM</button>`:''}
      ${active==='Pilot'?`<button class="btn btn-primary btn-sm" onclick="promoteToProd('${p.id}')">→ Promote to Production</button>`:''}
      ${active==='Production'?`<button class="btn btn-green btn-sm" onclick="lockProdBOM('${p.id}')">🔒 Lock Production BOM</button>`:''}
      ${phaseData&&phaseData.locked?`<span style="font-size:11px;color:var(--red);font-weight:700">🔒 LOCKED</span>`:''}
    </div>
  </div>`;
}

function setProjectBOMPhase(projId, phase) {
  const p = DB.projects.find(x => x.id === projId);
  ensureBOMPhases(p).activePhase = phase;
  PROJ_TAB.id = 'bomphases';
  renderProjectView();
}

function togglePhaseRow(projId, phase, idx, checked) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  const rows = phases[phase.toLowerCase()].rows;
  if (rows[idx]) rows[idx].include = checked;
  // Re-render just the BOM area
  PROJ_TAB.id = 'bomphases';
  renderProjectView();
}

function updPhaseRow(projId, phase, idx, field, val) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  const rows = phases[phase.toLowerCase()].rows;
  if (rows[idx]) rows[idx][field] = field==='qty'||field==='cost' ? parseFloat(val)||0 : val;
}

function removePhaseRow(projId, phase, idx) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  phases[phase.toLowerCase()].rows.splice(idx, 1);
  PROJ_TAB.id = 'bomphases';
  renderProjectView();
}

function addBOMPhaseRow(projId) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  const phase = phases.activePhase.toLowerCase();
  openModal('Add Row to ' + phases.activePhase + ' BOM', `
    <div class="fg"><label>Pick from SKU Catalog (optional)</label>
      <select id="fpr-sku" onchange="autofillPhaseRow(this.value)">
        <option value="">— Select or fill manually —</option>
        ${DB.skus.map(s=>`<option value="${s.id}">${s.sku} — ${s.name}</option>`).join('')}
      </select>
    </div>
    <div class="fgrid">
      <div class="fg"><label>SKU *</label><input id="fpr-s" placeholder="CTRL-PCB-003"/></div>
      <div class="fg"><label>Description *</label><input id="fpr-n" placeholder="CMC Management Board"/></div>
    </div>
    <div class="fgrid three">
      <div class="fg"><label>Qty</label><input id="fpr-q" type="number" value="1" step="any"/></div>
      <div class="fg"><label>Unit Cost ($)</label><input id="fpr-c" type="number" step="0.01" value="0"/></div>
      <div class="fg"><label>UOM</label><select id="fpr-u"><option>EA</option><option>M</option><option>KG</option><option>L</option><option>FT</option></select></div>
    </div>
    <div class="fgrid">
      <div class="fg"><label>Vendor</label><input id="fpr-v" placeholder="Mouser"/></div>
      <div class="fg"><label>Notes</label><input id="fpr-no" placeholder="Notes…"/></div>
    </div>`,
  `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="saveBOMPhaseRow('${projId}')">Add Row</button>`);
}

function autofillPhaseRow(skuId) {
  const s = DB.skus.find(x => x.id === skuId); if (!s) return;
  document.getElementById('fpr-s').value = s.sku;
  document.getElementById('fpr-n').value = s.name;
  document.getElementById('fpr-c').value = s.cost;
  document.getElementById('fpr-v').value = s.vendor || '';
}

function saveBOMPhaseRow(projId) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  const sku = vv('fpr-s'), name = vv('fpr-n');
  if (!sku || !name) { toast('SKU and name required', 'red'); return; }
  phases[phases.activePhase.toLowerCase()].rows.push({
    sku, name, qty: parseFloat(vv('fpr-q')) || 1, uom: vv('fpr-u'),
    cost: parseFloat(vv('fpr-c')) || 0, vendor: vv('fpr-v'), notes: vv('fpr-no'), include: true
  });
  closeModal();
  PROJ_TAB.id = 'bomphases';
  renderProjectView();
  toast('Row added', 'grn');
}

function copyPhaseRows(projId) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  const bom = DB.boms.find(b => b.id === p.bomId);
  if (!bom) { toast('No BOM linked to project', 'red'); return; }
  const baseRows = flatBOMRows(bom.rows).map(r => ({
    sku: r.sku, name: r.name, qty: r.qty, uom: r.uom,
    cost: r.cost, vendor: r.vendor, notes: r.notes || '', include: true
  }));
  const phase = phases.activePhase.toLowerCase();
  phases[phase].rows = JSON.parse(JSON.stringify(baseRows));
  PROJ_TAB.id = 'bomphases';
  renderProjectView();
  toast(`${phases.activePhase} BOM populated from master BOM`, 'grn');
}

function promoteToProd(projId) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  phases.production.rows = JSON.parse(JSON.stringify(phases.pilot.rows));
  phases.activePhase = 'Production';
  PROJ_TAB.id = 'bomphases';
  renderProjectView();
  toast('Pilot BOM promoted to Production', 'grn');
}

function lockProdBOM(projId) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  phases.production.locked = true;
  PROJ_TAB.id = 'bomphases';
  renderProjectView();
  toast('Production BOM locked 🔒', 'grn');
}

function exportPhaseCSV(projId, phase) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  const rows = phases[phase.toLowerCase()].rows.filter(r => r.include !== false);
  const csv = [['SKU','Description','Qty','UOM','Unit Cost','Ext Cost','Vendor','Notes'],
    ...rows.map(r => [r.sku,r.name,r.qty,r.uom||'EA',r.cost.toFixed(2),(r.qty*r.cost).toFixed(2),r.vendor,r.notes])
  ].map(row => row.map(x => `"${String(x||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `${p.name}_${phase}_BOM.csv`;
  a.click();
  toast(`${phase} BOM exported`, 'grn');
}

function createRFQsFromPhase(projId) {
  const p = DB.projects.find(x => x.id === projId);
  const phases = ensureBOMPhases(p);
  const rows = phases.rfq.rows.filter(r => r.include !== false);
  let created = 0;
  rows.forEach(row => {
    if (!p.rfqs.find(r => r.item === row.name)) {
      const n = DB.projects.flatMap(x => x.rfqs).length;
      p.rfqs.push({ id:'RFQ-'+(200+n+created), item:row.name, qty:row.qty, vendors:row.vendor||'TBD', quotesIn:0, total:1, deadline:'', status:'Sent', bomRowId:'', notes:'Auto-created from RFQ phase BOM' });
      created++;
    }
  });
  PROJ_TAB.id = 'rfqs';
  renderProjectView();
  toast(`${created} RFQ${created!==1?'s':''} created from RFQ BOM`, 'grn');
}

function renderPLMHub() {
  const parts = DB.parts || [];
  const lcGroups = {
    Prototype:  parts.filter(p => p.lifecycle === 'Development' || p.lifecycle === 'In Review'),
    Production: parts.filter(p => p.lifecycle === 'Released'),
    Obsolete:   parts.filter(p => p.lifecycle === 'Obsolete'),
  };
  const lcColors  = { Prototype:'var(--acc)',   Production:'var(--grn)',   Obsolete:'var(--t3)' };
  const lcBg      = { Prototype:'var(--acc-light)', Production:'var(--grn-light)', Obsolete:'var(--bg4)' };
  const lcBorder  = { Prototype:'var(--acc-mid)',    Production:'var(--grn-mid)',    Obsolete:'var(--b2)' };
  const lcIcons   = { Prototype:'⚗️', Production:'✅', Obsolete:'📦' };

  const stageBar = Object.entries(lcGroups).map(([stage, ps]) => `
    <div style="flex:1;padding:14px 16px;background:var(--bg2);position:relative;overflow:hidden;border-right:1px solid var(--b1)">
      <div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px">${lcIcons[stage]} ${stage}</div>
      <div style="font-size:30px;font-weight:700;font-family:var(--mono);color:${lcColors[stage]};line-height:1">${ps.length}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:3px">${ps.length===1?'product':'products'}</div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:${lcColors[stage]}"></div>
    </div>`).join('');

  const productCards = (stage, ps, color, bg, border) => {
    if (!ps.length) return `<div style="padding:18px 0;color:var(--t3);font-size:12px;text-align:center">No ${stage.toLowerCase()} products</div>`;
    return ps.map(part => {
      const bv = (DB.bomVersions||[]).find(b => b.partNum === part.partNum);
      const relECOs = (DB.ecos||[]).filter(e => e.affectedParts && e.affectedParts.includes(part.partNum));
      const openECOs = relECOs.filter(e => e.status === 'In Review').length;
      const latestRev = bv ? bv.versions[bv.versions.length-1] : null;
      const projsUsing = DB.projects.filter(p => {
        const bom = DB.boms.find(b => b.id === p.bomId);
        return bom && (bom.partNum === part.partNum || bom.name.includes(part.name.split(' ')[0]));
      });
      const docs = (DB.documents||[]).filter(d => d.projId && projsUsing.some(p=>p.id===d.projId));

      return `<div class="card" style="margin-bottom:10px;cursor:pointer;border-left:3px solid ${color};transition:box-shadow .15s" onclick="nav('plmproduct',{partId:'${part.id}'})" onmouseenter="this.style.boxShadow='0 4px 18px rgba(0,0,0,.1)'" onmouseleave="this.style.boxShadow=''">
        <div style="padding:13px 15px">
          <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px">
            <div style="flex:1;min-width:0">
              <div style="display:flex;gap:8px;align-items:center;margin-bottom:3px;flex-wrap:wrap">
                <span style="font-size:13px;font-weight:700">${part.name}</span>
                <span style="font-family:var(--mono);font-size:10px;background:${bg};color:${color};padding:2px 7px;border-radius:4px;border:1px solid ${border}">Rev ${part.rev}</span>
                <span style="font-family:var(--mono);font-size:10px;color:var(--t3)">${part.partNum}</span>
              </div>
              <div style="font-size:11px;color:var(--t3);display:flex;gap:10px;flex-wrap:wrap">
                <span><span class="tag">${part.category}</span></span>
                <span><span class="tag">${part.type}</span></span>
                <span>Owner: <strong style="color:var(--t2)">${part.owner}</strong></span>
                ${part.cost?`<span style="font-family:var(--mono);color:var(--grn)">$${part.cost.toFixed(2)}</span>`:''}
              </div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
              ${latestRev?`<span style="padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;background:${PHASE_COLORS[latestRev.phase]?'var(--pur-light)':'var(--bg4)'};color:${PHASE_COLORS[latestRev.phase]||'var(--t2)'}">${latestRev.phase}</span>`:''}
              ${openECOs?`<span style="background:var(--red-light);color:var(--red2);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">${openECOs} ECO open</span>`:''}
            </div>
          </div>
          <div style="display:flex;gap:8px">
            ${[
              ['BOM Revisions', bv ? bv.versions.length : 0, 'var(--acc)'],
              ['ECOs Total',    relECOs.length, 'var(--pur)'],
              ['Active Projects', projsUsing.length, 'var(--grn)'],
              ['Documents', docs.length, 'var(--cyn,var(--t2))'],
            ].map(([l,v,c]) => `<div style="flex:1;text-align:center;background:var(--bg3);border-radius:var(--r);padding:6px 4px">
              <div style="font-size:15px;font-weight:700;font-family:var(--mono);color:${v?c:'var(--t4)'}">${v}</div>
              <div style="font-size:9px;color:var(--t3);margin-top:1px">${l}</div>
            </div>`).join('')}
          </div>
          ${part.desc?`<div style="margin-top:8px;font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${part.desc}</div>`:''}
        </div>
      </div>`;
    }).join('');
  };

  return `
  <!-- Stage pipeline bar -->
  <div style="padding:14px 18px 0">
    <div style="display:flex;border-radius:var(--r2);overflow:hidden;border:1px solid var(--b1);box-shadow:var(--shadow)">${stageBar}</div>
  </div>

  <!-- Product columns by stage -->
  <div style="padding:14px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
    ${Object.entries(lcGroups).map(([stage, ps]) => `
    <div>
      <div style="font-size:11px;font-weight:700;color:${lcColors[stage]};text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:${lcColors[stage]};display:inline-block"></span>
        ${lcIcons[stage]} ${stage} <span style="background:${lcBg[stage]};border:1px solid ${lcBorder[stage]};color:${lcColors[stage]};padding:0 7px;border-radius:10px;font-size:10px">${ps.length}</span>
      </div>
      ${productCards(stage, ps, lcColors[stage], lcBg[stage], lcBorder[stage])}
      <div class="card" style="border:2px dashed var(--b2);background:transparent;box-shadow:none;cursor:pointer;padding:13px;text-align:center;margin-top:4px" onclick="openNewProduct('${stage}')">
        <div style="font-size:11px;color:var(--t3)">+ Add ${stage} Product</div>
      </div>
    </div>`).join('')}
  </div>`;
}

      <div class="card">
        <div class="card-hd"><span class="card-title">Product Stats</span></div>
        <div style="padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${[
            ['BOM Revisions', bv?bv.versions.length:0, 'var(--acc)'],
            ['Total ECOs', relECOs.length, 'var(--pur)'],

          <span>Part#: <strong style="font-family:var(--mono)">${bv.partNum}</strong></span>

        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="openNewBOMRevision('${bv.id}')">+ New Revision</button>

    <!-- Revision timeline -->

      <div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Revision Timeline</div>

        <div style="position:absolute;top:14px;left:0;right:0;height:2px;background:var(--b1);z-index:0"></div>
        ${bv.versions.map((ver,i)=>{
          const pCol=PHASE_COLORS[ver.phase]||'var(--t2)';
          const isCur=i===bv.versions.length-1;
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;z-index:1">
            <div style="width:28px;height:28px;border-radius:50%;background:${ver.status==='Released'?'var(--grn)':ver.status==='Obsolete'?'var(--bg4)':pCol};border:3px solid ${isCur?'var(--acc)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${ver.status==='Obsolete'?'var(--t3)':'#fff'};box-shadow:${isCur?'0 0 0 3px var(--acc-mid)':''}">${ver.rev}</div>
            <div style="text-align:center">${phaseBadge(ver.phase)}<div style="font-size:9px;color:var(--t3);margin-top:2px">${ver.date}</div></div>

              ${phaseBadge(ver.phase)}${lcBadge(ver.status)}

            </div>
            <div style="font-size:12px;color:var(--t2)">${ver.note}</div>
            <div style="font-size:10px;color:var(--t3);margin-top:2px">${ver.date} · ${ver.by} · ${ver.rows.length} components · $${totalCost.toFixed(2)}</div>

            <button class="btn btn-ghost btn-xs" onclick="openBOMVerDetail('${bv.id}','${ver.verId}')">View BOM</button>

}

function renderAllBOMs() {
  const productBOMs = DB.bomVersions || [];
  const projectBOMs = DB.boms || [];

  // Project BOM cards
  const projBOMCards = projectBOMs.map(bom => {
    const cost = calcBOMCost(bom.rows);
    const linkedProjs = DB.projects.filter(p => p.bomId === bom.id);
    const part = (DB.parts||[]).find(p=>p.partNum===bom.partNum);
    return `<div class="card" style="margin-bottom:9px">
      <div style="padding:13px 15px;display:flex;gap:12px;align-items:center">
        <div style="flex:1;min-width:0">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:5px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700;cursor:pointer;color:var(--acc)" onclick="nav('bom',{bomId:'${bom.id}'})">${bom.name}</span>
            ${bomStatusBadge(bom.status)}<span class="tag">Rev ${bom.rev}</span>
          </div>
          <div style="font-size:11px;color:var(--t3);display:flex;gap:12px;flex-wrap:wrap">
            <span>Part#: <strong class="mono" style="color:var(--t2)">${bom.partNum}</strong></span>
            <span>${flatBOMRows(bom.rows).length} components</span>
            <span style="color:var(--grn);font-family:var(--mono)">$${cost.toFixed(2)}</span>
            <span>${linkedProjs.length?'Projects: '+linkedProjs.map(p=>`<span style="color:var(--acc);cursor:pointer" onclick="nav('project',{projectId:'${p.id}'})">${p.name}</span>`).join(', '):'<span style="color:var(--t4)">Not linked</span>'}</span>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${part?`<button class="btn btn-ghost btn-sm" onclick="nav('plmproduct',{partId:'${part.id}'})">📦 PLM</button>`:''}
          <button class="btn btn-ghost btn-sm" onclick="nav('bom',{bomId:'${bom.id}'})">Open →</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Product BOM cards (from bomVersions)
  const prodBOMCards = productBOMs.map(bv => {
    const latestVer = bv.versions[bv.versions.length-1];
    const totalCost = latestVer ? latestVer.rows.reduce((a,r)=>a+(r.qty||1)*r.cost,0) : 0;
    const part = (DB.parts||[]).find(p=>p.partNum===bv.partNum);
    const relECOs = (DB.ecos||[]).filter(e=>e.affectedParts&&e.affectedParts.includes(bv.partNum));
    return `<div class="card" style="margin-bottom:9px">
      <div style="padding:13px 15px;display:flex;gap:12px;align-items:center">
        <div style="flex:1;min-width:0">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:5px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700">${bv.name}</span>
            ${latestVer?phaseBadge(latestVer.phase):''}
            ${latestVer?lcBadge(latestVer.status):''}
            <span class="tag" style="font-family:var(--mono)">Rev ${latestVer?latestVer.rev:'—'}</span>
          </div>
          <div style="font-size:11px;color:var(--t3);display:flex;gap:12px;flex-wrap:wrap">
            <span>Part#: <strong class="mono" style="color:var(--t2)">${bv.partNum}</strong></span>
            <span>${bv.versions.length} revision${bv.versions.length!==1?'s':''}</span>
            ${latestVer?`<span>${latestVer.rows.length} components</span><span style="color:var(--grn);font-family:var(--mono)">$${totalCost.toFixed(2)}</span>`:''}
            ${relECOs.length?`<span style="color:var(--amb)">⚡ ${relECOs.length} ECO${relECOs.length!==1?'s':''}</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${part?`<button class="btn btn-ghost btn-sm" onclick="nav('plmproduct',{partId:'${part.id}'})">📦 PLM →</button>`:''}
          <button class="btn btn-ghost btn-sm" onclick="openBOMVerDetail('${bv.id}','${latestVer?latestVer.verId:''}')">View BOM</button>
          ${bv.versions.length>1?`<button class="btn btn-ghost btn-sm" onclick="openBOMVerDiff('${bv.id}','${bv.versions[bv.versions.length-2].verId}','${latestVer?latestVer.verId:''}')">Diff</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div style="padding:14px 18px">
    <!-- Product BOMs heading -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:11px">
      <div style="font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;flex:1">📦 Product BOMs — ${productBOMs.length} product${productBOMs.length!==1?'s':''}</div>
      <button class="btn btn-ghost btn-sm" onclick="openCreateBOMVersion()">+ Track New Product BOM</button>
    </div>
    ${prodBOMCards||`<div class="card" style="padding:20px;text-align:center;margin-bottom:9px"><div style="color:var(--t3);font-size:12px">No product BOMs tracked yet</div><button class="btn btn-primary btn-sm" style="margin-top:9px" onclick="openCreateBOMVersion()">Start Tracking</button></div>`}

    <!-- Divider -->
    <div style="height:1px;background:var(--b1);margin:18px 0"></div>

    <!-- Project BOMs heading -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:11px">
      <div style="font-size:11px;font-weight:700;color:var(--grn);text-transform:uppercase;letter-spacing:.8px;flex:1">🗂 Project BOMs — ${projectBOMs.length} BOM${projectBOMs.length!==1?'s':''}</div>
      <button class="btn btn-ghost btn-sm" onclick="openNewBOM()">+ New Project BOM</button>
    </div>
    ${projBOMCards||`<div class="card" style="padding:20px;text-align:center"><div style="color:var(--t3);font-size:12px">No project BOMs yet</div></div>`}
  </div>`;
}

function nav(view, extra={}) {
  R.view = view;
  if (extra.projectId !== undefined) R.projectId = extra.projectId;
  if (extra.bomId     !== undefined) R.bomId     = extra.bomId;
  if (extra.partId    !== undefined) { R.partId = extra.partId; R.plmTab = undefined; }
  if (extra.memberId  !== undefined) { R.memberId = extra.memberId; R.memberTab = undefined; }
  DB.selectedBOMRow = null;
  renderNav();
  render();
}
