const FIN_TABS_STATE = {t:'overview'};

function renderWorkFinance() {
  const tab = FIN_TABS_STATE.t || 'overview';
  const tabs = [
    {id:'overview',  label:'Overview'},
    {id:'invoices',  label:`Invoices (${DB.invoices.length})`},
    {id:'expenses',  label:`Expenses (${(DB.expenses||[]).length})`},
    {id:'cashflow',  label:'Cash Flow'},
    {id:'margins',   label:'Project P&L'},
  ];

  // Compute all financial stats
  const invoiced  = DB.invoices.reduce((a,i)=>a+i.amount,0);
  const paid      = DB.invoices.filter(i=>i.status==='Paid').reduce((a,i)=>a+i.amount,0);
  const ar        = DB.invoices.filter(i=>i.status!=='Paid').reduce((a,i)=>a+i.amount,0);
  const overdue   = DB.invoices.filter(i=>i.status==='Overdue').reduce((a,i)=>a+i.amount,0);
  const expenses  = (DB.expenses||[]).reduce((a,e)=>a+e.amount,0);
  const poCommit  = DB.projects.flatMap(p=>p.pos).reduce((a,po)=>a+po.total,0);
  const projVal   = DB.projects.reduce((a,p)=>a+p.value,0);
  const grossProfit = paid - expenses;

  const body = tab==='overview' ? finOverview(invoiced,paid,ar,overdue,expenses,poCommit,projVal,grossProfit)
    : tab==='invoices'  ? finInvoices()
    : tab==='expenses'  ? finExpenses()
    : tab==='cashflow'  ? finCashFlow(paid,ar,overdue,expenses,poCommit)
    : tab==='margins'   ? finMargins()
    : '';

  return `
  <!-- Finance KPI bar -->
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;border-bottom:1px solid var(--b1);background:var(--bg2)">
    ${[
      ['Project Pipeline','$'+(projVal/1000).toFixed(0)+'K','var(--acc)','Total committed value'],
      ['Total Invoiced', '$'+(invoiced/1000).toFixed(0)+'K','var(--grn)','Revenue billed to date'],
      ['Collected',      '$'+(paid/1000).toFixed(0)+'K',   'var(--grn)','Cash received'],
      ['Accounts Rec.',  '$'+(ar/1000).toFixed(0)+'K',     'var(--amb)','Outstanding invoices'],
      ['Overdue',        '$'+(overdue/1000).toFixed(0)+'K','var(--red)','Past due'],
      ['PO Committed',   '$'+(poCommit/1000).toFixed(0)+'K','var(--pur)','Open purchase orders'],
    ].map(([l,v,c,sub],i)=>`<div style="padding:14px 16px;border-right:${i<5?'1px solid var(--b1)':'none'};position:relative">
      <div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px">${l}</div>
      <div style="font-size:22px;font-weight:700;font-family:var(--mono);color:${c}">${v}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:3px">${sub}</div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:${c}"></div>
    </div>`).join('')}
  </div>
  <!-- Tabs -->
  <div style="display:flex;background:var(--bg2);border-bottom:2px solid var(--b1);padding:0 16px;flex-shrink:0">
    ${tabs.map(t=>`<div style="padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;color:${tab===t.id?'var(--acc)':'var(--t3)'};border-bottom:2px solid ${tab===t.id?'var(--acc)':'transparent'};margin-bottom:-2px;white-space:nowrap;transition:.15s" onclick="FIN_TABS_STATE.t='${t.id}';document.getElementById('main-content').innerHTML=renderWorkFinance()">${t.label}</div>`).join('')}
  </div>
  <div style="flex:1;overflow-y:auto">${body}</div>`;
}

function finOverview(invoiced,paid,ar,overdue,expenses,poCommit,projVal,grossProfit) {
  const collectionRate = invoiced>0?Math.round(paid/invoiced*100):0;
  const expRatio = invoiced>0?((expenses/invoiced)*100).toFixed(1):0;
  const months=['Jan','Feb','Mar','Apr','May','Jun'];
  const mockInv=[218000,437500,0,520000,0,0];
  const mockPaid=[218000,218000,0,0,0,0];
  const maxBar=Math.max(...mockInv,1);

  return `<div style="padding:14px 18px;display:grid;grid-template-columns:2fr 1fr;gap:14px">
    <!-- Revenue bar chart -->
    <div class="card">
      <div class="card-hd"><span class="card-title">Revenue — Invoice vs Collected (2026)</span></div>
      <div style="padding:14px 16px">
        <div style="display:flex;gap:6px;align-items:flex-end;height:100px">
          ${months.map((m,i)=>{
            const ih=mockInv[i]?Math.max(8,Math.round(mockInv[i]/maxBar*90)):0;
            const ph=mockPaid[i]?Math.max(4,Math.round(mockPaid[i]/maxBar*90)):0;
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="display:flex;gap:2px;align-items:flex-end;height:90px">
                <div style="width:14px;background:var(--acc);opacity:.3;border-radius:3px 3px 0 0;height:${ih}px" title="Invoiced $${mockInv[i].toLocaleString()}"></div>
                <div style="width:14px;background:var(--grn);border-radius:3px 3px 0 0;height:${ph}px" title="Collected $${mockPaid[i].toLocaleString()}"></div>
              </div>
              <div style="font-size:9px;color:var(--t3)">${m}</div>
            </div>`;}).join('')}
        </div>
        <div style="display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">
          <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--acc);opacity:.3"></div><span style="font-size:11px;color:var(--t3)">Invoiced</span></div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--grn)"></div><span style="font-size:11px;color:var(--t3)">Collected</span></div>
        </div>
      </div>
    </div>
    <!-- Health metrics -->
    <div style="display:flex;flex-direction:column;gap:11px">
      <div class="card">
        <div class="card-hd"><span class="card-title">Financial Health</span></div>
        <div style="padding:11px 14px;display:flex;flex-direction:column;gap:9px">
          ${[
            ['Collection Rate', collectionRate+'%', collectionRate>=80?'var(--grn)':collectionRate>=60?'var(--amb)':'var(--red)', collectionRate],
            ['Expense Ratio',   expRatio+'%',       parseFloat(expRatio)<=20?'var(--grn)':parseFloat(expRatio)<=35?'var(--amb)':'var(--red)', Math.min(100,parseFloat(expRatio))],
            ['AR Coverage',     ar>0?Math.round(paid/ar*10)/10+'×':'∞', ar<paid?'var(--grn)':'var(--amb)', Math.min(100,ar>0?paid/ar*50:100)],
          ].map(([l,v,c,pct])=>`<div>
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;color:var(--t3)">${l}</span>
              <span style="font-size:12px;font-weight:700;font-family:var(--mono);color:${c}">${v}</span>
            </div>
            <div class="prog"><div class="prog-fill" style="width:${pct}%;background:${c}"></div></div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><span class="card-title">Quick Actions</span></div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="openNewInvoice()" style="justify-content:center">+ New Invoice</button>
          <button class="btn btn-ghost btn-sm" onclick="openNewExpense()" style="justify-content:center">+ Log Expense</button>
          <button class="btn btn-ghost btn-sm" onclick="FIN_TABS_STATE.t='margins';document.getElementById('main-content').innerHTML=renderWorkFinance()" style="justify-content:center">View P&L Report →</button>
        </div>
      </div>
    </div>
    <!-- Invoice aging table -->
    <div class="card" style="grid-column:1/-1">
      <div class="card-hd"><span class="card-title">Invoice Aging</span>
        <button class="btn btn-ghost btn-sm" onclick="FIN_TABS_STATE.t='invoices';document.getElementById('main-content').innerHTML=renderWorkFinance()">All Invoices →</button>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Invoice #</th><th>Customer</th><th>Project</th><th>Amount</th><th>Issued</th><th>Due</th><th>Days</th><th>Status</th><th></th></tr></thead>
        <tbody>${DB.invoices.map(inv=>{
          const proj=DB.projects.find(p=>p.id===inv.projId);
          const days=inv.due?Math.round((new Date()-new Date(inv.due))/86400000):0;
          const aged=inv.status!=='Paid'&&days>0;
          return `<tr class="trow" style="${aged?'background:var(--red-light)!important':''}">
            <td class="mono">${inv.id}</td>
            <td class="bold">${inv.customer}</td>
            <td style="font-size:11px">${proj?`<span class="tag" style="cursor:pointer;background:var(--acc-light);color:var(--acc2)" onclick="nav('project',{projectId:'${proj.id}'})">${proj.name}</span>`:'—'}</td>
            <td class="money">$${inv.amount.toLocaleString()}</td>
            <td class="mono" style="font-size:11px">${inv.issued}</td>
            <td class="mono" style="font-size:11px;color:${aged?'var(--red)':'inherit'}">${inv.due}</td>
            <td style="font-family:var(--mono);font-size:11px;font-weight:${aged?700:400};color:${aged?'var(--red)':'var(--t3)'}">${inv.status==='Paid'?'—':days>0?'+'+days+'d':Math.abs(days)+'d'}</td>
            <td>${invBadge(inv.status)}</td>
            <td style="white-space:nowrap">
              ${inv.status!=='Paid'?`<button class="btn btn-green btn-xs" onclick="markPaid('${inv.id}');FIN_TABS_STATE.t='overview';document.getElementById('main-content').innerHTML=renderWorkFinance()">✓ Paid</button>`:''}
            </td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>
    </div>
    <!-- Expense summary -->
    <div class="card">
      <div class="card-hd"><span class="card-title">Expenses by Category</span>
        <button class="btn btn-ghost btn-sm" onclick="FIN_TABS_STATE.t='expenses';document.getElementById('main-content').innerHTML=renderWorkFinance()">All →</button>
      </div>
      <div style="padding:12px 14px">
        ${Object.entries((DB.expenses||[]).reduce((acc,e)=>{acc[e.category]=(acc[e.category]||0)+e.amount;return acc;},{})).map(([cat,amt])=>{
          const pct=expenses>0?Math.round(amt/expenses*100):0;
          return `<div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:12px;color:var(--t2)">${cat}</span>
              <span style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--t1)">$${amt.toLocaleString()} <span style="font-size:10px;color:var(--t3)">${pct}%</span></span>
            </div>
            <div class="prog"><div class="prog-fill" style="width:${pct}%;background:var(--acc)"></div></div>
          </div>`;}).join('')}
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--b1);display:flex;justify-content:space-between">
          <span style="font-size:12px;font-weight:700">Total Expenses</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--red)">$${expenses.toLocaleString()}</span>
        </div>
      </div>
    </div>
    <!-- Gross profit -->
    <div class="card">
      <div class="card-hd"><span class="card-title">Gross Profit Summary</span></div>
      <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px">
        ${[
          ['Total Revenue (Collected)', '$'+paid.toLocaleString(), 'var(--grn)'],
          ['Total Expenses',           '-$'+expenses.toLocaleString(), 'var(--red)'],
          ['PO Commitments (Open)',    '-$'+poCommit.toLocaleString(), 'var(--amb)'],
          ['Gross Profit',             '$'+grossProfit.toLocaleString(), grossProfit>=0?'var(--grn)':'var(--red)'],
        ].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:var(--bg3);border-radius:var(--r)">
          <span style="font-size:12px;color:var(--t2)">${l}</span>
          <span style="font-size:14px;font-weight:700;font-family:var(--mono);color:${c}">${v}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function finCashFlow(paid,ar,overdue,expenses,poCommit) {
  const net = paid - expenses - poCommit;
  const rows = [
    {label:'Cash In — Collected Invoices', amount:paid, type:'in'},
    {label:'Cash Out — Operating Expenses', amount:-expenses, type:'out'},
    {label:'Cash Out — PO Commitments (open)', amount:-poCommit, type:'out'},
    {label:'Net Cash Position', amount:net, type:'net'},
    {label:'Accounts Receivable (outstanding)', amount:ar, type:'pending'},
    {label:'Of which overdue', amount:-overdue, type:'risk'},
  ];
  return `<div class="page-pad">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
      <div class="card">
        <div class="card-hd"><span class="card-title">Cash Flow Statement (YTD)</span></div>
        <div style="padding:12px 14px;display:flex;flex-direction:column;gap:6px">
          ${rows.map((r,i)=>{
            const isTot=r.type==='net';const isRisk=r.type==='risk';
            const c=r.type==='in'?'var(--grn)':r.type==='out'||r.type==='risk'?'var(--red)':r.type==='net'&&r.amount>=0?'var(--grn)':r.type==='pending'?'var(--amb)':'var(--red)';
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:${isTot?'11px':'8px'} 11px;background:${isTot?'var(--nav)':isRisk?'var(--red-light)':'var(--bg3)'};border-radius:var(--r);${isTot?'margin-top:6px':''}">
              <span style="font-size:12px;color:${isTot?'rgba(255,255,255,.6)':'var(--t2)'};font-weight:${isTot?700:400}">${r.label}</span>
              <span style="font-size:13px;font-weight:700;font-family:var(--mono);color:${isTot?'#4ade80':c}">${r.amount>=0?'+':''} $${Math.abs(r.amount).toLocaleString()}</span>
            </div>`;}).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><span class="card-title">Cash Flow Waterfall</span></div>
        <div style="padding:14px 16px">
          ${[['Invoiced',paid,'var(--grn)'],['Expenses',-expenses,'var(--red)'],['PO Commit',-poCommit,'var(--amb)'],['Net',net,net>=0?'var(--grn)':'var(--red)']].map(([l,v,c])=>{
            const w=Math.min(95,Math.abs(v)/Math.max(paid,1)*90);
            return `<div style="margin-bottom:11px">
              <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:4px"><span>${l}</span><span style="font-family:var(--mono);font-weight:700;color:${c}">${v>=0?'':'-'}$${Math.abs(v).toLocaleString()}</span></div>
              <div class="prog" style="height:14px;border-radius:4px"><div class="prog-fill" style="width:${w}%;background:${c};height:14px"></div></div>
            </div>`;}).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function finMargins() {
  return `<div class="page-pad"><div class="card" style="padding:0">
    <div class="card-hd"><span class="card-title">Project P&L — Revenue vs Cost</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Project</th><th>Customer</th><th>Stage</th><th>SO Revenue</th><th>BOM Cost</th><th>PO Actual</th><th>Expenses</th><th>Gross Margin $</th><th>Margin %</th></tr></thead>
      <tbody>${DB.projects.map(p=>{
        const bom=DB.boms.find(b=>b.id===p.bomId);
        const bomCost=bom?calcBOMCost(bom.rows):0;
        const soRev=p.sos.reduce((a,s)=>a+s.total,0);
        const poAct=p.pos.reduce((a,po)=>a+po.total,0);
        const projExp=(DB.expenses||[]).filter(e=>e.projId===p.id).reduce((a,e)=>a+e.amount,0);
        const totalCost=bomCost+projExp;
        const margin=soRev-totalCost;
        const marginPct=soRev>0?((margin/soRev)*100).toFixed(1):0;
        return `<tr class="trow" onclick="nav('project',{projectId:'${p.id}'})">
          <td class="bold">${p.name}</td><td style="font-size:11px">${p.customer}</td>
          <td>${stageBadge(p.stage)}</td>
          <td class="money">$${soRev.toLocaleString()}</td>
          <td class="mono">$${bomCost.toFixed(0)}</td>
          <td class="mono">$${poAct.toLocaleString()}</td>
          <td class="mono" style="color:var(--red)">$${projExp.toLocaleString()}</td>
          <td><span style="font-family:var(--mono);font-weight:700;font-size:13px;color:${margin>=0?'var(--grn)':'var(--red)'}">$${margin.toLocaleString()}</span></td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">
              <div class="prog" style="width:55px"><div class="prog-fill" style="width:${Math.max(0,Math.min(100,parseFloat(marginPct)))}%;background:${margin>=0?'var(--grn)':'var(--red)'}"></div></div>
              <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${margin>=0?'var(--grn)':'var(--red)'}">${marginPct}%</span>
            </div>
          </td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>
  </div></div>`;
}

function openNewExpense() {
  openModal('Log Expense',`
    <div class="fgrid"><div class="fg"><label>Description *</label><input id="fexd" placeholder="PCB prototyping materials"/></div>
    <div class="fg"><label>Category</label><select id="fexc"><option>Materials</option><option>Equipment</option><option>Marketing</option><option>Travel</option><option>Training</option><option>Software</option><option>Other</option></select></div></div>
    <div class="fgrid"><div class="fg"><label>Amount ($) *</label><input id="fexa" type="number" step="0.01" placeholder="0.00"/></div>

    <div class="fg"><label>Project (optional)</label><select id="fexp"><option value="">— None —</option>${DB.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div></div>

function saveExpense() {
  const desc=vv('fexd'),amt=parseFloat(vv('fexa'));
  if(!desc||isNaN(amt)){toast('Description and amount required','red');return;}
  const n=(DB.expenses||[]).length;
  DB.expenses=DB.expenses||[];
  DB.expenses.push({id:'EXP-'+String(n+6).padStart(3,'0'),desc,category:vv('fexc'),amount:amt,date:vv('fexdt'),by:vv('fexby'),projId:vv('fexp'),approved:document.getElementById('fexap')?.checked||false,receipt:document.getElementById('fexrc')?.checked||false});
  closeModal();renderNav();document.getElementById('main-content').innerHTML=renderWorkFinance();toast('Expense logged','grn');
}

function approveExpense(id) {
  const e=(DB.expenses||[]).find(x=>x.id===id);if(e)e.approved=true;
  FIN_TABS_STATE.t='expenses';document.getElementById('main-content').innerHTML=renderWorkFinance();toast('Expense approved','grn');
}

}

function setMemberPerm(memberId, module, level) {
  const m=(DB.team||[]).find(x=>x.id===memberId);if(!m)return;
  if(!m.permissions)m.permissions={};
  m.permissions[module]=level;
  R.memberTab='permissions';renderMemberEdit();toast(`${module} → ${level}`,'grn');
}

function setAllPerms(memberId, level) {
  const m=(DB.team||[]).find(x=>x.id===memberId);if(!m)return;
  if(!m.permissions)m.permissions={};
  PERM_MODULES.forEach(mod=>{m.permissions[mod.id]=level;});
  R.memberTab='permissions';renderMemberEdit();toast('All permissions set to '+level,'grn');
}

function applyRolePreset(memberId, role) {
  const m=(DB.team||[]).find(x=>x.id===memberId);if(!m)return;
  m.role=role;
  const presets = {
    admin:       {projects:'full',boms:'full',finance:'full',procurement:'full',plm:'full',eco:'full',inventory:'full',customers:'full',vendors:'full',reports:'full',settings:'full',team:'full'},
    manager:     {projects:'full',boms:'full',finance:'view',procurement:'full',plm:'view',eco:'view',inventory:'full',customers:'full',vendors:'full',reports:'full',settings:'none',team:'none'},
    engineer:    {projects:'view',boms:'full',finance:'none',procurement:'view',plm:'full',eco:'full',inventory:'view',customers:'none',vendors:'view',reports:'view',settings:'none',team:'none'},
    finance:     {projects:'view',boms:'view',finance:'full',procurement:'view',plm:'none',eco:'none',inventory:'view',customers:'full',vendors:'view',reports:'full',settings:'none',team:'none'},
    procurement: {projects:'view',boms:'view',finance:'view',procurement:'full',plm:'none',eco:'none',inventory:'full',customers:'none',vendors:'full',reports:'view',settings:'none',team:'none'},
    viewer:      {projects:'view',boms:'view',finance:'none',procurement:'none',plm:'view',eco:'none',inventory:'none',customers:'none',vendors:'none',reports:'none',settings:'none',team:'none'},
  };
  m.permissions=presets[role]||presets.viewer;
  R.memberTab='permissions';renderMemberEdit();toast('Role preset applied: '+role,'grn');
}

function openEditMember(memberId) {
  const m=(DB.team||[]).find(x=>x.id===memberId);if(!m)return;
  openModal('Edit: '+m.name,`
    <div class="fgrid"><div class="fg"><label>Full Name</label><input id="fmn" value="${m.name}"/></div>
    <div class="fg"><label>Title</label><input id="fmt" value="${m.title}"/></div></div>
    <div class="fgrid"><div class="fg"><label>Department</label><input id="fmd" value="${m.dept}"/></div>
    <div class="fg"><label>Role</label><select id="fmr">${Object.entries(ROLE_META).map(([r,meta])=>`<option value="${r}"${m.role===r?' selected':''}>${meta.label}</option>`).join('')}</select></div></div>
    <div class="fgrid"><div class="fg"><label>Email</label><input id="fme" value="${m.email}"/></div>
    <div class="fg"><label>Phone</label><input id="fmp" value="${m.phone||''}"/></div></div>
    <div class="fgrid"><div class="fg"><label>Location</label><input id="fml" value="${m.location||''}"/></div>
    <div class="fg"><label>Status</label><select id="fms"><option${m.status==='Active'?' selected':''}>Active</option><option${m.status==='Invited'?' selected':''}>Invited</option><option${m.status==='Inactive'?' selected':''}>Inactive</option></select></div></div>
    <div class="fg fgrid one"><label>Bio</label><textarea id="fmb">${m.bio||''}</textarea></div>`,
  `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="saveEditMember('${memberId}')">Save</button>`);
}

function saveEditMember(id) {
  const m=(DB.team||[]).find(x=>x.id===id);if(!m)return;
  m.name=vv('fmn');m.title=vv('fmt');m.dept=vv('fmd');m.role=vv('fmr');
  m.email=vv('fme');m.phone=vv('fmp');m.location=vv('fml');m.status=vv('fms');m.bio=vv('fmb');
  closeModal();renderNav();renderMemberEdit();toast('Profile updated','grn');
}

function openInviteMember() {
  openModal('Invite Team Member',`
    <div class="fgrid"><div class="fg"><label>Full Name *</label><input id="fmn" placeholder="Sarah Kim"/></div>
    <div class="fg"><label>Email *</label><input id="fme" placeholder="s.kim@company.com"/></div></div>
    <div class="fgrid"><div class="fg"><label>Title</label><input id="fmt" placeholder="Mechanical Engineer"/></div>
    <div class="fg"><label>Department</label><input id="fmd" placeholder="Engineering"/></div></div>
    <div class="fg"><label>Role & Base Permissions</label><select id="fmr">${Object.entries(ROLE_META).map(([r,meta])=>`<option value="${r}">${meta.label} — ${meta.desc}</option>`).join('')}</select></div>`,
  `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="saveInviteMember()">Send Invite</button>`);
}

function saveInviteMember() {
  const name=vv('fmn'),email=vv('fme');
  if(!name||!email){toast('Name and email required','red');return;}
  const role=vv('fmr');
  const presets={admin:{projects:'full',boms:'full',finance:'full',procurement:'full',plm:'full',eco:'full',inventory:'full',customers:'full',vendors:'full',reports:'full',settings:'full',team:'full'},manager:{projects:'full',boms:'full',finance:'view',procurement:'full',plm:'view',eco:'view',inventory:'full',customers:'full',vendors:'full',reports:'full',settings:'none',team:'none'},engineer:{projects:'view',boms:'full',finance:'none',procurement:'view',plm:'full',eco:'full',inventory:'view',customers:'none',vendors:'view',reports:'view',settings:'none',team:'none'},finance:{projects:'view',boms:'view',finance:'full',procurement:'view',plm:'none',eco:'none',inventory:'view',customers:'full',vendors:'view',reports:'full',settings:'none',team:'none'},procurement:{projects:'view',boms:'view',finance:'view',procurement:'full',plm:'none',eco:'none',inventory:'full',customers:'none',vendors:'full',reports:'view',settings:'none',team:'none'},viewer:{projects:'view',boms:'view',finance:'none',procurement:'none',plm:'view',eco:'none',inventory:'none',customers:'none',vendors:'none',reports:'none',settings:'none',team:'none'}};
  const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const colors=['#2563eb','#7c3aed','#059669','#d97706','#0891b2','#dc2626','#6366f1'];
  DB.team=DB.team||[];
  DB.team.push({id:'tm'+Date.now(),name,email,title:vv('fmt'),dept:vv('fmd'),role,avatar:initials,color:colors[DB.team.length%colors.length],status:'Invited',joined:'',phone:'',location:'',bio:'',permissions:presets[role]||presets.viewer,recentActivity:[]});
  closeModal();renderNav();render();toast('Invite sent to '+email,'grn');
}

// ════════════════════════════════════════════════════
// PERMISSIONS PAGE — Org-wide matrix view
// ════════════════════════════════════════════════════
function renderPermissions() {
  const team = DB.team||[];
  return `<div style="padding:14px 18px">
    <div style="font-size:12px;color:var(--t3);margin-bottom:13px">Click any cell to toggle. Click a member name to open their profile.</div>
    <div class="card" style="padding:0;overflow-x:auto">
      <table style="border-collapse:collapse;min-width:100%">
        <thead>
          <tr>
            <th style="padding:10px 14px;font-size:9.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--b1);background:var(--bg3);position:sticky;left:0;z-index:3;min-width:160px">Team Member</th>
            <th style="padding:10px 14px;font-size:9.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--b1);background:var(--bg3);min-width:90px">Role</th>
            ${PERM_MODULES.map(mod=>`<th style="padding:10px 8px;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid var(--b1);background:var(--bg3);text-align:center;min-width:72px">${mod.label}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${team.map((m,mi)=>{
            const rm=ROLE_META[m.role]||ROLE_META.viewer;
            return `<tr style="${mi%2?'background:var(--bg3)':'background:var(--bg2)'}">
              <td style="padding:9px 14px;border-bottom:1px solid var(--b1);position:sticky;left:0;background:${mi%2?'var(--bg3)':'var(--bg2)'};z-index:2">
                <div style="display:flex;gap:8px;align-items:center;cursor:pointer" onclick="nav('memberedit',{memberId:'${m.id}'})">
                  <div style="width:28px;height:28px;border-radius:50%;background:${m.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">${m.avatar}</div>
                  <div><div style="font-size:12px;font-weight:600;color:var(--acc)">${m.name}</div><div style="font-size:10px;color:var(--t3)">${m.title}</div></div>
                </div>
              </td>
              <td style="padding:9px 14px;border-bottom:1px solid var(--b1)">
                <span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:${rm.bg};color:${rm.color}">${rm.label}</span>
              </td>
              ${PERM_MODULES.map(mod=>{
                const p=(m.permissions||{})[mod.id]||'none';
                const nextLevel={none:'view',view:'edit',edit:'full',full:'none'};
                const pc={none:'var(--t4)',view:'var(--acc)',edit:'var(--amb)',full:'var(--grn)'}[p];
                const icon={none:'○',view:'👁',edit:'✏️',full:'✅'}[p];
                return `<td style="padding:8px;border-bottom:1px solid var(--b1);text-align:center;cursor:pointer" onclick="setMemberPerm('${m.id}','${mod.id}','${nextLevel[p]}')" title="${mod.label}: ${p} → click to change">
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
                    <span style="font-size:13px">${icon}</span>
                    <span style="font-size:8px;font-weight:700;color:${pc}">${p.toUpperCase()}</span>
                  </div>
                </td>`;}).join('')}
            </tr>`;}).join('')}
        </tbody>
      </table>
    </div>
    <div style="margin-top:12px;display:flex;gap:14px;align-items:center;font-size:11px;color:var(--t3)">
      <span>Legend:</span>
      ${[['○','none','No access','var(--t4)'],['👁','view','View only','var(--acc)'],['✏️','edit','Can edit','var(--amb)'],['✅','full','Full access','var(--grn)']].map(([ic,l,d,c])=>`<span style="display:flex;align-items:center;gap:4px">${ic} <span style="font-weight:700;color:${c}">${l.toUpperCase()}</span> — ${d}</span>`).join('')}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
// ACTIVITY LOG
// ════════════════════════════════════════════════════
function renderActivityLog() {
  const log = DB.activityLog||[];
  const modules=[...new Set(log.map(a=>a.module))];
  return `<div style="padding:14px 18px">
    <div style="display:flex;gap:8px;margin-bottom:13px;align-items:center;flex-wrap:wrap">
      <select id="al-module" onchange="document.getElementById('main-content').innerHTML=renderActivityLog()" style="background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:6px 10px;font-size:12px;font-family:var(--font)">
        <option value="">All Modules</option>${modules.map(m=>`<option>${m}</option>`).join('')}
      </select>
      <select id="al-user" onchange="document.getElementById('main-content').innerHTML=renderActivityLog()" style="background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:6px 10px;font-size:12px;font-family:var(--font)">
        <option value="">All Users</option>${(DB.team||[]).map(m=>`<option>${m.name}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:var(--t3);margin-left:4px">${log.length} events</span>
    </div>
    <div class="card" style="padding:0">
      ${log.filter(a=>{
        const mf=(document.getElementById('al-module')||{value:''}).value;
        const uf=(document.getElementById('al-user')||{value:''}).value;
        return(!mf||a.module===mf)&&(!uf||a.user===uf);
      }).map((a,i,arr)=>{
        const m=(DB.team||[]).find(t=>t.name===a.user);
        return `<div style="display:flex;gap:12px;padding:12px 15px;border-bottom:${i<arr.length-1?'1px solid var(--b1)':'none'};align-items:flex-start">
          <div style="width:34px;height:34px;border-radius:50%;background:${a.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${a.avatar}</div>
          <div style="flex:1">
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:3px;flex-wrap:wrap">
              <span style="font-size:12px;font-weight:600;color:var(--t1)">${a.user}</span>
              <span class="tag" style="font-size:9px">${a.module}</span>
            </div>
            <div style="font-size:12px;color:var(--t2)">${a.icon} ${a.action}</div>
          </div>
          <div style="font-size:10px;color:var(--t3);font-family:var(--mono);flex-shrink:0">${a.ts}</div>
        </div>`;}).join('')}
    </div>
  </div>`;
}

// INIT
renderNav();
render();
</script>
</body>
</html>
