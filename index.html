<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ManufactOS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#f8f9fb;--bg4:#eef0f4;
  --nav:#141c2b;--nav2:#1d2840;--nav3:#26344f;
  --b1:#e4e7ed;--b2:#d1d5de;--b3:#b8bfcc;
  --t1:#111827;--t2:#4b5563;--t3:#9ca3af;--t4:#d1d5db;
  --acc:#2563eb;--acc2:#1d4ed8;--acc-light:#eff6ff;--acc-mid:#bfdbfe;
  --grn:#059669;--grn2:#047857;--grn-light:#ecfdf5;--grn-mid:#a7f3d0;
  --amb:#d97706;--amb2:#b45309;--amb-light:#fffbeb;--amb-mid:#fde68a;
  --red:#dc2626;--red2:#b91c1c;--red-light:#fef2f2;--red-mid:#fecaca;
  --pur:#7c3aed;--pur-light:#f5f3ff;
  --cyan:#0891b2;--cyan-light:#ecfeff;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:6px;--r2:10px;--r3:14px;--r4:20px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow2:0 4px 16px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.06);
  --shadow3:0 20px 60px rgba(0,0,0,.15),0 8px 24px rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden;font-family:var(--font);font-size:13px;color:var(--t1);background:var(--bg)}
.app{display:flex;height:100vh}

/* ── SIDEBAR ───────────────────────────── */
.sidebar{width:220px;min-width:220px;background:var(--nav);display:flex;flex-direction:column;overflow:hidden}
.logo{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;letter-spacing:-0.5px}
.logo-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:rgba(255,255,255,.3);font-family:var(--mono);margin-top:1px;letter-spacing:.5px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:600;color:rgba(255,255,255,.25);letter-spacing:1.2px;text-transform:uppercase;padding:10px 8px 4px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;transition:all .15s;margin:1px 0}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.nav-item-qc{color:rgba(74,222,128,.7);background:rgba(74,222,128,.06)}
.nav-item.nav-item-qc:hover{background:rgba(74,222,128,.12);color:#4ade80}
.nav-item.nav-item-qc.active{background:rgba(74,222,128,.15);color:#4ade80}
.nav-item.nav-item-ai{color:rgba(167,139,250,.8);background:rgba(124,58,237,.08)}
.nav-item.nav-item-ai:hover{background:rgba(124,58,237,.15);color:#c4b5fd}
.nav-item.nav-item-ai.active{background:rgba(124,58,237,.2);color:#c4b5fd}
.nav-item.nav-item-meet{color:rgba(251,191,36,.8);background:rgba(217,119,6,.07)}
.nav-item.nav-item-meet:hover{background:rgba(217,119,6,.14);color:#fbbf24}
.nav-item.nav-item-meet.active{background:rgba(217,119,6,.18);color:#fbbf24}
.nav-item.nav-item-mrp{color:rgba(56,189,248,.8);background:rgba(8,145,178,.07)}
.nav-item.nav-item-mrp:hover{background:rgba(8,145,178,.14);color:#38bdf8}
.nav-item.nav-item-mrp.active{background:rgba(8,145,178,.2);color:#38bdf8}
.nav-item.nav-item-plm{color:rgba(34,211,238,.85);background:rgba(6,182,212,.07)}
.nav-item.nav-item-plm:hover{background:rgba(6,182,212,.14);color:#22d3ee}
.nav-item.nav-item-plm.active{background:rgba(6,182,212,.2);color:#22d3ee}
.nav-item.nav-item-bver{color:rgba(192,132,252,.85);background:rgba(139,92,246,.07)}
.nav-item.nav-item-bver:hover{background:rgba(139,92,246,.14);color:#c084fc}
.nav-item.nav-item-bver.active{background:rgba(139,92,246,.2);color:#c084fc}
.nav-item.nav-item-eco{color:rgba(251,113,133,.85);background:rgba(244,63,94,.06)}
.nav-item.nav-item-eco:hover{background:rgba(244,63,94,.12);color:#fb7185}
.nav-item.nav-item-eco.active{background:rgba(244,63,94,.18);color:#fb7185}
.nav-item.nav-item-wfin{color:rgba(52,211,153,.85);background:rgba(5,150,105,.06)}
.nav-item.nav-item-wfin:hover{background:rgba(5,150,105,.12);color:#34d399}
.nav-item.nav-item-wfin.active{background:rgba(5,150,105,.2);color:#34d399}
.nav-item.nav-item-company{color:rgba(251,191,36,.85);background:rgba(217,119,6,.06)}
.nav-item.nav-item-company:hover{background:rgba(217,119,6,.13);color:#fbbf24}
.nav-item.nav-item-company.active{background:rgba(217,119,6,.2);color:#fbbf24}
.nav-item.nav-item-perms{color:rgba(167,139,250,.85);background:rgba(124,58,237,.06)}
.nav-item.nav-item-perms:hover{background:rgba(124,58,237,.13);color:#c4b5fd}
.nav-item.nav-item-perms.active{background:rgba(124,58,237,.2);color:#c4b5fd}
.nav-item.nav-item-actlog{color:rgba(56,189,248,.8);background:rgba(8,145,178,.06)}
.nav-item.nav-item-actlog:hover{background:rgba(8,145,178,.13);color:#38bdf8}
.nav-item.nav-item-actlog.active{background:rgba(8,145,178,.2);color:#38bdf8}
.nav-item.nav-item-co{color:rgba(248,113,113,.8);background:rgba(220,38,38,.06)}
.nav-item.nav-item-co:hover{background:rgba(220,38,38,.12);color:#f87171}
.nav-item.nav-item-co.active{background:rgba(220,38,38,.18);color:#f87171}
.nav-item.nav-item-cv{color:rgba(52,211,153,.8);background:rgba(5,150,105,.06)}
.nav-item.nav-item-cv:hover{background:rgba(5,150,105,.12);color:#34d399}
.nav-item.nav-item-cv.active{background:rgba(5,150,105,.2);color:#34d399}
.kpi.pur::before{background:var(--pur)}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.nav-badge.warn{background:rgba(217,119,6,.3);color:#fbbf24}
.nav-badge.danger{background:rgba(220,38,38,.3);color:#fca5a5}
.nav-user{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.nav-uname{font-size:11px;font-weight:500;color:rgba(255,255,255,.6)}
.nav-urole{font-size:10px;color:rgba(255,255,255,.25)}

/* ── MAIN ───────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:var(--shadow)}
.page-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3)}
.breadcrumb span{cursor:pointer;color:var(--acc)}
.breadcrumb span:hover{text-decoration:underline}
.breadcrumb .sep{color:var(--t4)}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

/* ── BUTTONS ───────────────────────────── */
.btn{padding:7px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc2)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--b2)}
.btn-ghost:hover{background:var(--bg3);color:var(--t1)}
.btn-green{background:var(--grn);color:#fff}
.btn-green:hover{background:var(--grn2)}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid)}
.btn-danger:hover{background:var(--red-mid)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:4px}
.btn-icon{padding:6px;border-radius:var(--r);background:transparent;border:1px solid var(--b1);cursor:pointer;color:var(--t3);display:inline-flex;align-items:center;justify-content:center;transition:.15s}
.btn-icon:hover{background:var(--bg3);color:var(--t1);border-color:var(--b2)}

/* ── CARDS / PANELS ───────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);box-shadow:var(--shadow)}
.card-hd{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.card-body{padding:16px}

/* ── KPI ───────────────────────────── */
.kpi-grid{display:grid;gap:12px;padding:20px 20px 0}
.kpi-4{grid-template-columns:repeat(4,1fr)}
.kpi-3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r2) var(--r2) 0 0}
.kpi.acc::before{background:var(--acc)}
.kpi.grn::before{background:var(--grn)}
.kpi.amb::before{background:var(--amb)}
.kpi.red::before{background:var(--red)}
.kpi.pur::before{background:var(--pur)}
.kpi-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:700;letter-spacing:-1.5px;font-family:var(--mono);line-height:1}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:6px;display:flex;align-items:center;gap:4px}
.kpi-sub.up{color:var(--grn)}
.kpi-sub.dn{color:var(--red)}

/* ── TABLES ───────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:9px 14px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap;background:var(--bg3)}
td{padding:10px 14px;border-bottom:1px solid var(--b1);font-size:12px;color:var(--t2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.trow:hover td{background:rgba(37,99,235,.03);cursor:pointer}
td.bold{color:var(--t1);font-weight:600}
td.mono{font-family:var(--mono);font-size:11px}
td.money{font-family:var(--mono);font-size:12px;color:var(--grn);font-weight:600}
td.money.neg{color:var(--red)}

/* ── BADGES ───────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.bg{background:var(--grn-light);color:var(--grn2)}
.bb{background:var(--acc-light);color:var(--acc2)}
.ba{background:var(--amb-light);color:var(--amb2)}
.br{background:var(--red-light);color:var(--red2)}
.bp{background:var(--pur-light);color:var(--pur)}
.bk{background:var(--bg4);color:var(--t2)}
.bc{background:var(--cyan-light);color:var(--cyan)}

/* ── PROGRESS ───────────────────────────── */
.prog{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── MODAL ───────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-bg.hidden{display:none}
.modal{background:var(--bg2);border-radius:var(--r3);width:100%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow3);display:flex;flex-direction:column}
.modal-hd{padding:20px 24px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.modal-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--t3);line-height:1;padding:2px;border-radius:4px}
.modal-x:hover{color:var(--t1);background:var(--bg4)}
.modal-body{padding:20px 24px;flex:1;overflow-y:auto}
.modal-footer{padding:14px 24px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* ── FORMS ───────────────────────────── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.fg label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);color:var(--t1);padding:8px 10px;font-size:12px;font-family:var(--font);transition:.15s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--acc);background:#fff}
.fg textarea{resize:vertical;min-height:64px}
select option{background:var(--bg2)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgrid.three{grid-template-columns:1fr 1fr 1fr}
.fgrid.one{grid-template-columns:1fr}

/* ── TOAST ───────────────────────────── */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--nav);color:#e2e8f0;border-radius:var(--r2);padding:10px 16px;font-size:12px;display:flex;align-items:center;gap:8px;animation:tIn .2s ease;max-width:300px;border:1px solid rgba(255,255,255,.08);pointer-events:auto;box-shadow:var(--shadow2)}
.toast.hide{animation:tOut .2s ease forwards}
@keyframes tIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(6px)}}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── CONFIRM ───────────────────────────── */
.cfm-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.cfm-bg.hidden{display:none}
.cfm-box{background:var(--bg2);border-radius:var(--r2);padding:24px;max-width:360px;width:100%;box-shadow:var(--shadow3)}
.cfm-title{font-size:15px;font-weight:700;margin-bottom:8px}
.cfm-msg{font-size:12px;color:var(--t2);margin-bottom:20px;line-height:1.6}
.cfm-btns{display:flex;gap:8px;justify-content:flex-end}

/* ── SIDE PANEL (BOM item detail) ───────────────────────────── */
.side-panel{width:400px;min-width:400px;background:var(--bg2);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .2s}
.side-panel.hidden{width:0;min-width:0;border:none;overflow:hidden}
.sp-hd{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.sp-title{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sp-section{padding:14px 16px;border-bottom:1px solid var(--b1)}
.sp-sec-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.sp-field{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.sp-field-label{font-size:11px;color:var(--t3);flex-shrink:0;width:90px}
.sp-field-val{font-size:12px;color:var(--t1);font-weight:500;text-align:right;flex:1}
.sp-tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0}
.sp-tab{padding:9px 14px;font-size:11px;font-weight:600;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.sp-tab:hover{color:var(--t2)}
.sp-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.sp-tab-body{flex:1;overflow-y:auto;padding:14px 16px}

/* ── CHAT ───────────────────────────── */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.chat-msg{display:flex;gap:8px}
.chat-msg.mine{flex-direction:row-reverse}
.chat-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.chat-bubble{max-width:240px;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5}
.chat-msg:not(.mine) .chat-bubble{background:var(--bg3);color:var(--t1);border-radius:4px 10px 10px 10px}
.chat-msg.mine .chat-bubble{background:var(--acc);color:#fff;border-radius:10px 4px 10px 10px}
.chat-meta{font-size:10px;color:var(--t3);margin-top:3px}
.chat-msg.mine .chat-meta{text-align:right}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end;padding-top:10px;border-top:1px solid var(--b1);flex-shrink:0}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r2);padding:8px 12px;font-size:12px;font-family:var(--font);resize:none;min-height:36px;max-height:100px;outline:none;transition:.15s;line-height:1.4}
.chat-input:focus{border-color:var(--acc);background:#fff}
.chat-send{background:var(--acc);border:none;border-radius:var(--r);padding:7px 12px;cursor:pointer;color:#fff;font-size:11px;font-weight:600;flex-shrink:0}
.chat-send:hover{background:var(--acc2)}

/* ── BOM TABLE ───────────────────────────── */
.bom-tbl{width:100%;border-collapse:collapse}
.bom-tbl th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;text-align:left;border-bottom:2px solid var(--b1);background:var(--bg3);white-space:nowrap}
.bom-tbl td{padding:0;border-bottom:1px solid var(--b1);vertical-align:middle}
.bom-row-wrap{display:flex;min-height:52px}
.bom-cell{padding:8px 12px;display:flex;align-items:center;font-size:12px;color:var(--t2);word-break:break-word}
.bom-cell.bold{color:var(--t1);font-weight:600}
.bom-cell.mono{font-family:var(--mono);font-size:11px}
.bom-cell.money{font-family:var(--mono);color:var(--grn);font-weight:600}
.bom-row-tr{transition:background .1s}
.bom-row-tr:hover{background:rgba(37,99,235,.03)}
.bom-row-tr.selected{background:var(--acc-light) !important}
.bom-row-tr.child{background:rgba(0,0,0,.01)}
.indent-guide{width:2px;height:28px;background:var(--b2);border-radius:1px;margin:0 6px 0 10px;flex-shrink:0}
.expand-btn{width:18px;height:18px;border-radius:3px;border:1px solid var(--b2);background:var(--bg2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;color:var(--t3);flex-shrink:0;transition:.15s;line-height:1}
.expand-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-light)}
.has-child-btn{border-color:var(--acc-mid);color:var(--acc);background:var(--acc-light)}
.bom-add-row{display:flex;align-items:center;gap:8px;padding:10px 14px;color:var(--t3);font-size:12px;cursor:pointer;border-bottom:1px solid var(--b1);transition:.15s}
.bom-add-row:hover{background:var(--acc-light);color:var(--acc)}
.bom-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bom-row-actions{display:flex;gap:4px;opacity:0;transition:.15s}
.bom-row-tr:hover .bom-row-actions{opacity:1}

/* ── INLINE EDIT ───────────────────────────── */
.ie{background:transparent;border:none;outline:none;font-family:var(--mono);font-size:11px;color:var(--t1);width:100%}
.ie:focus{background:var(--acc-light);border-radius:3px;padding:2px 4px;outline:1px solid var(--acc)}

/* ── PROJECT PAGE ───────────────────────────── */
.proj-hd{background:var(--bg2);border-bottom:1px solid var(--b1);padding:20px;box-shadow:var(--shadow)}
.proj-name{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.proj-meta{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.proj-meta-item{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:4px}
.proj-meta-item strong{color:var(--t2);font-weight:600}
.proj-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.proj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── ACTIVITY ───────────────────────────── */
.act-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)}
.act-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.act-body{flex:1}
.act-text{font-size:12px;color:var(--t2);line-height:1.5}
.act-text strong{color:var(--t1);font-weight:600}
.act-time{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:2px}

/* ── SKU LIST ───────────────────────────── */
.sku-search-bar{display:flex;gap:8px;padding:16px;border-bottom:1px solid var(--b1);background:var(--bg2)}
.sku-search{flex:1;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);color:var(--t1);padding:8px 12px;font-size:12px;font-family:var(--font)}
.sku-search:focus{outline:none;border-color:var(--acc)}

/* ── MISC ───────────────────────────── */
.divider{height:1px;background:var(--b1);margin:16px 0}
.section-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--t3);gap:8px}
.empty-icon{font-size:28px;opacity:.5}
.empty-txt{font-size:12px}
.tag{display:inline-flex;align-items:center;padding:2px 7px;background:var(--bg4);border-radius:4px;font-size:10px;color:var(--t2);font-family:var(--mono)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--b1);color:var(--t2);background:var(--bg2)}

.page-pad{padding:20px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.mt-14{margin-top:14px}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}
</style>

function renderNav() {
  let html='', lastSec='';
  NAV_ITEMS.forEach(n=>{
    if(n.sec!==lastSec){html+=`<div class="nav-sec">${n.sec}</div>`;lastSec=n.sec;}
    const active = R.view===n.id
      ||(R.view==='project'&&n.id==='projects')
      ||(R.view==='bom'&&n.id==='allboms')
      ||(R.view==='ecodetail'&&n.id==='eco')
      ||(R.view==='plmproduct'&&n.id==='plm')
      ||(R.view==='memberedit'&&n.id==='company');
    const badge = n.id==='projects'?DB.projects.length
      :n.id==='allboms'?(DB.boms.length+(DB.parts||[]).length)
      :n.id==='plm'?(DB.parts||[]).length
      :n.id==='vendors'?DB.vendors.length
      :n.id==='customers'?DB.customers.length
      :n.id==='company'?(DB.team||[]).length||null
      :n.id==='changeorders'?(DB.changeOrders||[]).filter(c=>c.status==='Pending').length||null
      :n.id==='documents'?(DB.documents||[]).length||null
      :null;
    const urgentMRP = n.id==='mrp'?runMRP().filter(a=>a.urgency==='critical').length:0;
    const ecoInReview = n.id==='eco'?(DB.ecos||[]).filter(e=>e.status==='In Review').length:0;
    const finOverdue = n.id==='workfinance'?DB.invoices.filter(i=>i.status==='Overdue').length:0;
    const warn = n.id==='mrp'&&urgentMRP?urgentMRP
      :n.id==='eco'&&ecoInReview?ecoInReview
      :n.id==='workfinance'&&finOverdue?finOverdue:null;
    const isQC = n.id==='quickcreate';
    const isAI = n.special==='ai';
    const isMeet = n.special==='meeting';
    const isMRP = n.special==='mrp';
    const isPLM = n.special==='plm';
    const isAllBoms = n.special==='allboms';
    const isECO = n.special==='eco';
    const isWFin = n.special==='wfin';
    const isCompany = n.special==='company';
    const isPerms = n.special==='perms';
    const isActLog = n.special==='actlog';
    let extraCls = isQC?' nav-item-qc':isAI?' nav-item-ai':isMeet?' nav-item-meet':isMRP?' nav-item-mrp':isPLM?' nav-item-plm':isAllBoms?' nav-item-bver':isECO?' nav-item-eco':isWFin?' nav-item-wfin':isCompany?' nav-item-company':isPerms?' nav-item-perms':isActLog?' nav-item-actlog':'';
    html+=`<div class="nav-item${active?' active':''}${extraCls}" onclick="nav('${n.id}')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">${n.icon}</svg>
      ${n.label}
      ${badge?`<span class="nav-badge">${badge}</span>`:''}
      ${warn?`<span class="nav-badge danger">${warn}</span>`:''}
    </div>`;
  });
  document.getElementById('sidebar-nav').innerHTML=html;
}

function nav(view, extra={}) {
  R.view=view;
  if(extra.projectId!==undefined)R.projectId=extra.projectId;
  if(extra.bomId!==undefined)R.bomId=extra.bomId;
  DB.selectedBOMRow=null;
  renderNav();
  render();
}

function setTopbar(crumbs, actions='') {
  const bc = crumbs.map((c,i)=>{
    if(i<crumbs.length-1) return `<span onclick="${c.onclick||''}">${c.label}</span><span class="sep">/</span>`;
    return `<span style="color:var(--t1);font-weight:600">${c.label}</span>`;
  }).join('');
  document.getElementById('topbar-breadcrumb').innerHTML=bc;
  document.getElementById('topbar-actions').innerHTML=actions;
}

function ensurePMTasks(p){
  // Auto-populate PM tasks from BOM rows if tasks array doesn't exist
  if(!p.tasks) p.tasks=[];
  if(p.bomId && p.tasks.filter(t=>t.fromBOM).length===0){
    const bom=DB.boms.find(b=>b.id===p.bomId);
    if(bom){
      flatBOMRows(bom.rows).forEach((row,i)=>{
        if(!p.tasks.find(t=>t.bomRowId===row.id)){
          p.tasks.push({
            id:'t'+Date.now()+i, name:row.name, sku:row.sku,
            type:'procurement', fromBOM:true, bomRowId:row.id,
            assignee:'', status:'Not Started',
            startDate:p.startDate||'', endDate:p.dueDate||'',
            progress:0, notes:'', priority:'Medium',
            linkedPO:'', linkedSO:'', linkedRFQ:''
          });
        }
      });
    }
  }
}

function syncBOMFromTasks(projId){
  // When a PM task status/progress changes, sync to BOM row
  const p=DB.projects.find(x=>x.id===projId);
  if(!p||!p.tasks||!p.bomId) return;
  const bom=DB.boms.find(b=>b.id===p.bomId);
  if(!bom) return;
  p.tasks.filter(t=>t.fromBOM&&t.bomRowId).forEach(task=>{
    const row=findBOMRow(bom.rows,task.bomRowId);
    if(!row) return;
    // Map task status → BOM row status
    const statusMap={'Done':'Active','In Progress':'Active','Not Started':'Active','Blocked':'Review','Cancelled':'Obsolete'};
    row.status=statusMap[task.status]||row.status;
  });
  // Recalc project progress from tasks
  if(p.tasks.length>0){
    const avg=Math.round(p.tasks.reduce((a,t)=>a+t.progress,0)/p.tasks.length);
    p.progress=avg;
  }
}

// ── PM TABLE TAB ─────────────────────────────────────
const PM_STATUS_COLORS={'Not Started':'var(--t3)','In Progress':'var(--acc)','Done':'var(--grn)','Blocked':'var(--red)','Cancelled':'var(--t4)'};
const PM_PRIORITY_COLORS={'High':'var(--red)','Medium':'var(--amb)','Low':'var(--grn)'};

function renderPMTable(p){
  const tasks=p.tasks||[];
  return `<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div style="padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;gap:8px;align-items:center;flex-shrink:0">

      <span style="font-size:11px;color:var(--t3)">·</span>
      <span style="font-size:11px;color:var(--grn)">${tasks.filter(t=>t.status==='Done').length} done</span>
      <span style="font-size:11px;color:var(--acc)">${tasks.filter(t=>t.status==='In Progress').length} in progress</span>
      ${tasks.filter(t=>t.status==='Blocked').length?`<span style="font-size:11px;color:var(--red)">${tasks.filter(t=>t.status==='Blocked').length} blocked</span>`:''}
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="addPMTask('${p.id}')">+ Add Task</button>
        <button class="btn btn-ghost btn-sm" onclick="importBOMTasks('${p.id}')">↓ Sync BOM</button>
      </div>
    </div>
    <div style="flex:1;overflow:auto">
      <table class="pm-table">
        <thead><tr>
          <th style="width:28px"></th>
          <th style="min-width:240px">Task / Item</th>
          <th style="width:80px">Type</th>
          <th style="width:110px">Status</th>
          <th style="width:90px">Priority</th>
          <th style="width:100px">Assignee</th>
          <th style="width:100px">Start Date</th>
          <th style="width:100px">End Date</th>
          <th style="width:60px">Progress</th>
          <th style="width:120px">Linked Doc</th>
          <th style="width:140px">Notes</th>

function renderPMRow(t,i,projId){
  const sc=PM_STATUS_COLORS[t.status]||'var(--t3)';
  const pc=PM_PRIORITY_COLORS[t.priority]||'var(--t3)';
  const linkedPO=t.linkedPO?`<span class="tag" style="font-size:9px">${t.linkedPO}</span>`:'';
  const linkedSO=t.linkedSO?`<span class="tag" style="background:var(--grn-light);color:var(--grn2);font-size:9px">${t.linkedSO}</span>`:'';
  const linkedRFQ=t.linkedRFQ?`<span class="tag" style="background:var(--amb-light);color:var(--amb2);font-size:9px">${t.linkedRFQ}</span>`:'';
  return `<tr class="pm-row${t.fromBOM?' bom-task':''}">
    <td><div class="pm-cell" style="justify-content:center;padding:4px 6px">
      ${t.fromBOM?`<span title="Synced from BOM" style="font-size:10px;color:var(--acc)">📋</span>`:`<span style="font-size:10px;color:var(--t4)">#${i+1}</span>`}
    </div></td>
    <td><div class="pm-cell bold" style="gap:6px">
      <div style="width:3px;height:28px;background:${sc};border-radius:2px;flex-shrink:0"></div>
      <input value="${escQ(t.name)}" style="font-weight:600;font-size:12px" onchange="updateTask('${projId}','${t.id}','name',this.value)"/>
      ${t.sku?`<span class="tag" style="font-size:9px;flex-shrink:0">${t.sku}</span>`:''}
    </div></td>
    <td><div class="pm-cell">
      <select onchange="updateTask('${projId}','${t.id}','type',this.value)" style="font-size:11px">
        <option${t.type==='procurement'?' selected':''}>procurement</option>
        <option${t.type==='engineering'?' selected':''}>engineering</option>
        <option${t.type==='production'?' selected':''}>production</option>
        <option${t.type==='qa'?' selected':''}>qa</option>
        <option${t.type==='logistics'?' selected':''}>logistics</option>
        <option${t.type==='other'?' selected':''}>other</option>
      </select>
    </div></td>
    <td><div class="pm-cell">
      <select onchange="updateTask('${projId}','${t.id}','status',this.value)" style="color:${sc};font-weight:600;font-size:11px">
        ${['Not Started','In Progress','Done','Blocked','Cancelled'].map(s=>`<option${t.status===s?' selected':''}>${s}</option>`).join('')}
      </select>
    </div></td>
    <td><div class="pm-cell">
      <select onchange="updateTask('${projId}','${t.id}','priority',this.value)" style="color:${pc};font-size:11px;font-weight:600">
        ${['High','Medium','Low'].map(s=>`<option${t.priority===s?' selected':''}>${s}</option>`).join('')}
      </select>
    </div></td>
    <td><div class="pm-cell"><input value="${escQ(t.assignee)}" placeholder="—" onchange="updateTask('${projId}','${t.id}','assignee',this.value)" style="font-size:11px"/></div></td>
    <td><div class="pm-cell"><input type="date" value="${t.startDate||''}" onchange="updateTask('${projId}','${t.id}','startDate',this.value)" style="font-size:11px"/></div></td>
    <td><div class="pm-cell"><input type="date" value="${t.endDate||''}" onchange="updateTask('${projId}','${t.id}','endDate',this.value)" style="font-size:11px"/></div></td>
    <td><div class="pm-cell" style="flex-direction:column;gap:3px;padding:6px 8px">
      <input type="range" min="0" max="100" value="${t.progress}" style="width:100%;cursor:pointer;accent-color:${sc}" oninput="updateTask('${projId}','${t.id}','progress',parseInt(this.value));this.nextElementSibling.textContent=this.value+'%'"/>
      <span style="font-size:9px;color:var(--t3);font-family:var(--mono);text-align:center">${t.progress}%</span>
    </div></td>
    <td><div class="pm-cell" style="gap:3px;flex-wrap:wrap">${linkedSO}${linkedPO}${linkedRFQ}${!linkedSO&&!linkedPO&&!linkedRFQ?`<span style="color:var(--t4);font-size:10px">—</span>`:''}</div></td>
    <td><div class="pm-cell"><input value="${escQ(t.notes)}" placeholder="Notes…" onchange="updateTask('${projId}','${t.id}','notes',this.value)" style="font-size:11px;color:var(--t3)"/></div></td>
    <td><div class="pm-cell" style="gap:3px;padding:4px 8px">
      <button class="btn btn-ghost btn-xs" onclick="deletePMTask('${projId}','${t.id}')" title="Delete" style="padding:2px 5px;font-size:11px">✕</button>
    </div></td>
  </tr>`;
}

function updateTask(projId,taskId,field,value){
  const p=DB.projects.find(x=>x.id===projId);
  const t=p.tasks.find(x=>x.id===taskId);
  if(!t)return;
  t[field]=value;
  if(field==='status'||field==='progress') syncBOMFromTasks(projId);
  // Update progress bar in topbar via mini-refresh of header strip only
  const prog=document.querySelector('.proj-tab-nav');
  if(!prog) return;
  // Recalc project progress
  const avg=Math.round(p.tasks.reduce((a,x)=>a+x.progress,0)/Math.max(1,p.tasks.length));
  p.progress=avg;
}

function addPMTask(projId){
  const p=DB.projects.find(x=>x.id===projId);
  openModal('Add Task',`
    <div class="fgrid"><div class="fg"><label>Task Name *</label><input id="f-tn" placeholder="e.g. Order aluminum housing"/></div>
    <div class="fg"><label>Type</label><select id="f-ttype"><option>procurement</option><option>engineering</option><option>production</option><option>qa</option><option>logistics</option><option>other</option></select></div></div>
    <div class="fgrid">
      <div class="fg"><label>Status</label><select id="f-tst"><option>Not Started</option><option>In Progress</option><option>Done</option><option>Blocked</option></select></div>
      <div class="fg"><label>Priority</label><select id="f-tpr"><option>High</option><option selected>Medium</option><option>Low</option></select></div>
    </div>
    <div class="fgrid">
      <div class="fg"><label>Assignee</label><input id="f-tasn" placeholder="Team member"/></div>
      <div class="fg"><label>Progress (%)</label><input id="f-tprog" type="number" min="0" max="100" value="0"/></div>
    </div>
    <div class="fgrid">
      <div class="fg"><label>Start Date</label><input id="f-tstart" type="date" value="${p.startDate||today()}"/></div>
      <div class="fg"><label>End Date</label><input id="f-tend" type="date" value="${p.dueDate||''}"/></div>
    </div>
    <div class="fg fgrid one"><label>Notes</label><textarea id="f-tnotes" placeholder="Notes…"></textarea></div>`,
  `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="savePMTask('${projId}')">Add Task</button>`);
}

function savePMTask(projId){
  const p=DB.projects.find(x=>x.id===projId);
  const name=vv('f-tn');
  if(!name){toast('Task name required','red');return;}
  p.tasks.push({id:'t'+Date.now(),name,type:vv('f-ttype'),fromBOM:false,bomRowId:'',assignee:vv('f-tasn'),status:vv('f-tst'),startDate:vv('f-tstart'),endDate:vv('f-tend'),progress:parseInt(vv('f-tprog'))||0,notes:vv('f-tnotes'),priority:vv('f-tpr'),linkedPO:'',linkedSO:'',linkedRFQ:''});
  closeModal();PROJ_TAB.id='pm';renderProjectView();toast('Task added','grn');
}

function deletePMTask(projId,taskId){
  const p=DB.projects.find(x=>x.id===projId);
  p.tasks=p.tasks.filter(t=>t.id!==taskId);
  PROJ_TAB.id='pm';renderProjectView();toast('Task deleted','red');
}

function importBOMTasks(projId){
  const p=DB.projects.find(x=>x.id===projId);
  p.tasks=p.tasks.filter(t=>!t.fromBOM); // remove old BOM tasks
  ensurePMTasks(p);
  PROJ_TAB.id='pm';renderProjectView();toast('BOM tasks synced','grn');
}

// ── GANTT TAB ─────────────────────────────────────
function renderGantt(p){
  const tasks=p.tasks||[];
  if(!tasks.length) return `<div class="empty" style="flex:1"><div class="empty-icon">📅</div><div class="empty-txt">No tasks to display. Add tasks in the Tasks tab.</div></div>`;

  // Build date range from all tasks
  const dates=tasks.flatMap(t=>[t.startDate,t.endDate]).filter(Boolean).sort();
  let minDate=dates[0]||p.startDate||today();
  let maxDate=dates[dates.length-1]||p.dueDate||today();

  // Expand range a bit
  const minD=new Date(minDate); minD.setDate(minD.getDate()-3);
  const maxD=new Date(maxDate); maxD.setDate(maxD.getDate()+7);

  const days=[];
  const cur=new Date(minD);
  while(cur<=maxD){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}

  const todayStr=today();

  // Build month headers
  const months=[];
  days.forEach((d,i)=>{
    const mKey=d.getFullYear()+'-'+d.getMonth();
    if(!months.length||months[months.length-1].key!==mKey){
      if(months.length) months[months.length-1].span=i-months[months.length-1].start;
      months.push({key:mKey,label:d.toLocaleString('default',{month:'short',year:'2-digit'}),start:i,span:1});
    }
  });
  if(months.length) months[months.length-1].span=days.length-months[months.length-1].start;

  const dayW=28;
  const statusBar=t=>PM_STATUS_COLORS[t.status]||'var(--t3)';

  return `<div style="flex:1;overflow:auto">
    <table class="gantt-table">
      <thead>
        <tr>
          <th class="gantt-label-cell" rowspan="2" style="z-index:5">Task</th>
          ${months.map(m=>`<th class="gantt-month-hd" colspan="${m.span}" style="min-width:${m.span*dayW}px">${m.label}</th>`).join('')}
        </tr>
        <tr>
          ${days.map(d=>{
            const ds=fmtDate(d);
            const isWE=d.getDay()===0||d.getDay()===6;
            const isTod=ds===todayStr;
            return `<th style="min-width:${dayW}px;width:${dayW}px;padding:4px 0;background:${isTod?'rgba(37,99,235,.1)':isWE?'#f5f6f8':'var(--bg3)'};border-right:1px solid var(--b1);border-bottom:2px solid var(--b1)">
              <span class="gantt-day-num" style="color:${isTod?'var(--acc)':isWE?'var(--t4)':'var(--t3)'};font-weight:${isTod?700:400}">${d.getDate()}</span>
            </th>`;
          }).join('')}
        </tr>
      </thead>
      <tbody>
        ${tasks.map(t=>{
          const tStart=t.startDate?new Date(t.startDate):null;
          const tEnd=t.endDate?new Date(t.endDate):null;
          const startIdx=tStart?days.findIndex(d=>fmtDate(d)>=fmtDate(tStart)):-1;
          const endIdx=tEnd?days.findIndex(d=>fmtDate(d)>fmtDate(tEnd)):-1;
          const spanCount=startIdx>=0&&endIdx>startIdx?endIdx-startIdx:startIdx>=0?days.length-startIdx:0;
          const barColor=statusBar(t);
          return `<tr style="height:44px">
            <td class="gantt-label-cell" style="font-size:12px;font-weight:${t.fromBOM?600:400}">
              <div style="display:flex;align-items:center;gap:6px;overflow:hidden">
                <div style="width:8px;height:8px;border-radius:50%;background:${barColor};flex-shrink:0"></div>
                <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px" title="${t.name}">${t.name}</span>
                ${t.fromBOM?`<span style="font-size:9px;color:var(--acc);flex-shrink:0">📋</span>`:''}
              </div>
              <div style="font-size:10px;color:var(--t3);margin-top:2px;padding-left:14px">${t.status} · ${t.progress}%</div>
            </td>
            ${days.map((d,di)=>{
              const ds=fmtDate(d);
              const isWE=d.getDay()===0||d.getDay()===6;
              const isTod=ds===todayStr;
              const isBarStart=di===startIdx&&spanCount>0;
              if(isBarStart){
                const barW=Math.max(spanCount*dayW-4,dayW-4);
                const progW=Math.round(t.progress/100*barW);
                return `<td colspan="${spanCount}" style="padding:0;border-right:1px solid var(--b1);background:${isTod?'rgba(37,99,235,.04)':isWE?'#f9fafb':'#fff'}">
                  <div style="position:relative;height:44px;display:flex;align-items:center;padding:0 2px">
                    <div style="width:${barW}px;height:20px;background:${barColor};opacity:.2;border-radius:4px;position:absolute;left:2px"></div>
                    <div style="width:${progW}px;height:20px;background:${barColor};border-radius:4px;position:absolute;left:2px;display:flex;align-items:center;padding:0 6px;overflow:hidden">
                      <span style="font-size:10px;font-weight:700;color:#fff;white-space:nowrap">${t.progress>20?t.name:''}</span>
                    </div>
                  </div>
                </td>`;
              }
              if(startIdx>=0&&di>startIdx&&di<startIdx+spanCount) return '';
              return `<td style="border-right:1px solid var(--b1);background:${isTod?'rgba(37,99,235,.04)':isWE?'#f9fafb':'#fff'}"></td>`;
            }).join('')}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div style="padding:12px 16px;font-size:11px;color:var(--t3);border-top:1px solid var(--b1)">
      📋 = BOM task &nbsp;·&nbsp; 
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block"></span> Done</span> &nbsp;
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--acc);display:inline-block"></span> In Progress</span> &nbsp;
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span> Blocked</span> &nbsp;
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--t3);display:inline-block"></span> Not Started</span>
    </div>
  </div>`;
}

function fmtDate(d){return d.toISOString().split('T')[0];}

// ── BOM TAB ─────────────────────────────────────────
function renderProjBOM(p,bom){

  return `<div style="flex:1;overflow:auto">
    <div style="padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;gap:12px;align-items:center;flex-shrink:0">

          const linkedPO=p.pos.find(po=>po.bomRowId===row.id);
          const linkedRFQ=p.rfqs.find(r=>r.bomRowId===row.id);

          const pmTask=p.tasks&&p.tasks.find(t=>t.bomRowId===row.id);
          const indent='&nbsp;'.repeat(row._level*3);
          return `<tr class="bom-row-tr">
            <td><div class="bom-cell" style="font-size:10px;color:var(--t3)">${i+1}</div></td>
            <td><div class="bom-cell mono" style="font-size:10px">${row.sku}</div></td>

            <td><div class="bom-cell mono">${row.qty}</div></td>
            <td><div class="bom-cell money">$${row.cost.toFixed(2)}</div></td>

            <td><div class="bom-cell" style="font-size:11px">${row.vendor}</div></td>

            <td><div class="bom-cell" style="font-size:10px">
              ${pmTask?`<span style="display:flex;align-items:center;gap:3px"><span style="width:6px;height:6px;border-radius:50%;background:${PM_STATUS_COLORS[pmTask.status]||'var(--t3)'};flex-shrink:0"></span>${pmTask.status}</span>`:'<span style="color:var(--t4)">—</span>'}
            </div></td>
            <td><div class="bom-cell" style="gap:3px;flex-direction:column;align-items:flex-start">
              ${linkedSO?`<span class="tag" style="background:var(--grn-light);color:var(--grn2);font-size:9px">${linkedSO.id}</span>`:''}

function editRFQInline(projId,rfqId){
  const proj=DB.projects.find(p=>p.id===projId);
  const r=proj.rfqs.find(x=>x.id===rfqId);
  openModal('Edit RFQ: '+r.id,`
    <div class="fgrid"><div class="fg"><label>Item</label><input id="f-ritem" value="${r.item}"/></div>
    <div class="fg"><label>Qty</label><input id="f-rqty" type="number" value="${r.qty}"/></div></div>
    <div class="fg fgrid one"><label>Vendors</label><input id="f-rvend" value="${r.vendors||''}"/></div>
    <div class="fgrid">
      <div class="fg"><label>Quotes Received</label><input id="f-qi" type="number" value="${r.quotesIn}" min="0"/></div>
      <div class="fg"><label>Status</label><select id="f-rstat">
        ${['Sent','Awaiting','Complete','Cancelled'].map(s=>`<option${r.status===s?' selected':''}>${s}</option>`).join('')}
      </select></div>
    </div>
    <div class="fgrid"><div class="fg"><label>Deadline</label><input id="f-rdl" type="date" value="${r.deadline||''}"/></div>
    <div class="fg"><label>Notes</label><input id="f-rnotes" value="${r.notes||''}"/></div></div>`,
  `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="saveEditRFQInline('${projId}','${rfqId}')">Save</button>`);
}
function saveEditRFQInline(projId,rfqId){
  const r=DB.projects.find(p=>p.id===projId).rfqs.find(x=>x.id===rfqId);
  r.item=vv('f-ritem');r.qty=parseInt(vv('f-rqty'))||1;r.vendors=vv('f-rvend');
  r.quotesIn=parseInt(vv('f-qi'))||0;r.total=r.vendors?r.vendors.split(',').length:0;
  r.status=vv('f-rstat');r.deadline=vv('f-rdl');r.notes=vv('f-rnotes');
  closeModal();PROJ_TAB.id='rfqs';renderProjectView();toast('RFQ saved','grn');
}
function convertRFQtoPOProj(projId,rfqId){
  const proj=DB.projects.find(p=>p.id===projId);
  const r=proj.rfqs.find(x=>x.id===rfqId);
  const firstVendor=(r.vendors||'').split(',')[0].trim();
  const n=DB.projects.flatMap(p=>p.pos).length;
  proj.pos.push({id:'PO-'+(400+n),vendor:firstVendor||'TBD',items:r.item+' ×'+r.qty,total:0,ordered:today(),expected:'',status:'Pending',bomRowId:r.bomRowId||''});
  r.status='Complete';
  PROJ_TAB.id='pos';renderProjectView();toast('PO created from RFQ','grn');
}

function escQ(s){return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function renderBOMRows(rows, level, bomId, proj){
  let html='';
  rows.forEach((row,idx)=>{
    const has=row.children&&row.children.length>0;
    const expanded=DB.bomExpanded[row.id]!==false;
    const ext=(row.qty*row.cost).toFixed(2);
    const isSelected=DB.selectedBOMRow===row.id;
    const linkedPO=proj?proj.pos.find(po=>po.bomRowId===row.id):null;
    const linkedRFQ=proj?proj.rfqs.find(r=>r.bomRowId===row.id):null;
    const linkedSO=proj?proj.sos.find(so=>so.bomRowId===row.id):null;
    const hasChat=DB.chats[row.id]&&DB.chats[row.id].length>0;
    const pid=proj?proj.id:'';

    html+=`<tr class="bom-row-tr${isSelected?' selected':''}${level>0?' child':''}" onclick="selectBOMRow('${row.id}','${bomId}')">
      <td>
        <div class="bom-cell" style="padding-left:${8+level*20}px;gap:6px">
          ${has?`<button class="expand-btn has-child-btn" onclick="toggleBOMExpand('${row.id}',event)">${expanded?'▾':'▸'}</button>`:
                `${level>0?'<div class="indent-guide"></div>':'<div style="width:24px"></div>'}`}
          <span class="mono" style="color:var(--t3);font-size:10px">${idx+1}</span>
        </div>
      </td>
      <td><div class="bom-cell mono" style="font-size:11px">${row.sku}</div></td>
      <td>
        <div class="bom-cell bold" style="padding-left:${level>0?level*20:0}px">
          ${row.name}
          ${hasChat?`<span style="font-size:9px;background:var(--acc-light);color:var(--acc);border-radius:10px;padding:1px 5px;margin-left:4px;font-family:var(--mono);font-weight:700">${DB.chats[row.id].length}</span>`:''}
        </div>
      </td>
      <td><div class="bom-cell mono">${row.qty}</div></td>
      <td><div class="bom-cell" style="font-size:11px;color:var(--t3)">${row.uom}</div></td>
      <td><div class="bom-cell mono">$${row.cost.toFixed(2)}</div></td>
      <td><div class="bom-cell money">$${ext}</div></td>
      <td><div class="bom-cell" style="font-size:11px">${row.vendor}</div></td>
      <td><div class="bom-cell">${rowStatusBadge(row.status)}</div></td>
      <td><div class="bom-cell" style="gap:3px;flex-direction:column;align-items:flex-start">
        ${linkedSO?`<span class="tag" style="background:var(--grn-light);color:var(--grn2);font-size:9px;cursor:pointer" title="Sales Order">${linkedSO.id}</span>`:''}
        ${linkedPO?`<span class="tag" style="cursor:pointer;font-size:9px" title="Purchase Order">${linkedPO.id}</span>`:''}
        ${linkedRFQ?`<span class="tag" style="background:var(--amb-light);color:var(--amb2);font-size:9px" title="RFQ">${linkedRFQ.id}</span>`:''}
        ${!linkedSO&&!linkedPO&&!linkedRFQ?`<span style="font-size:10px;color:var(--t4)">—</span>`:''}
      </div></td>
      <td>
        <div class="bom-cell" style="gap:4px;flex-wrap:wrap;padding:6px 8px" onclick="e=>e.stopPropagation()">
          <button class="btn btn-xs" style="background:var(--grn-light);color:var(--grn2);border:1px solid var(--grn-mid);font-size:9px;padding:2px 6px;border-radius:3px" onclick="quickSOFromRow('${bomId}','${row.id}','${pid}')" title="Create Sales Order for this item">SO</button>
          <button class="btn btn-xs" style="background:var(--acc-light);color:var(--acc2);border:1px solid var(--acc-mid);font-size:9px;padding:2px 6px;border-radius:3px" onclick="quickPOFromRow('${bomId}','${row.id}','${pid}')" title="Create Purchase Order for this item">PO</button>
          <button class="btn btn-xs" style="background:var(--amb-light);color:var(--amb2);border:1px solid var(--amb-mid);font-size:9px;padding:2px 6px;border-radius:3px" onclick="quickRFQFromRow('${bomId}','${row.id}','${pid}')" title="Create RFQ for this item">RFQ</button>
          <button class="btn-icon" onclick="selectBOMRow('${row.id}','${bomId}')" title="Details" style="width:20px;height:20px;padding:0;font-size:11px">⋯</button>
        </div>
      </td>
    </tr>`;
    if(has&&expanded){html+=renderBOMRows(row.children,level+1,bomId,proj);}
  });
  return html;
}

function selectBOMRow(rowId, bomId){
  DB.selectedBOMRow=rowId;
  // Re-highlight
  document.querySelectorAll('.bom-row-tr').forEach(el=>el.classList.remove('selected'));
  const bom=DB.boms.find(b=>b.id===bomId);
  const row=findBOMRow(bom.rows,rowId);
  if(!row)return;

  // Show side panel
  const sp=document.getElementById('side-panel');
  if(sp){sp.classList.remove('hidden');}
  renderSidePanel(row,bomId);
}

function renderSidePanel(row, bomId){
  const proj=DB.projects.find(p=>p.id===R.projectId);
  const linkedPO=proj?proj.pos.find(po=>po.bomRowId===row.id):null;
  const linkedRFQ=proj?proj.rfqs.find(r=>r.bomRowId===row.id):null;
  const linkedSKU=DB.skus.find(s=>s.id===row.skuId);
  const tab=DB.sidePanelTab||'details';

  const sp=document.getElementById('side-panel');

  sp.innerHTML=`
    <div class="sp-hd">

        <div style="font-size:10px;color:var(--t3);font-family:var(--mono)">${row.sku}</div>

function spField(label,val){

function setSPTab(tab, rowId, bomId){
  DB.sidePanelTab=tab;
  const bom=DB.boms.find(b=>b.id===bomId);
  const row=findBOMRow(bom.rows,rowId);
  if(row)renderSidePanel(row,bomId);
}

function closeSidePanel(){
  DB.selectedBOMRow=null;
  const sp=document.getElementById('side-panel');
  if(sp)sp.classList.add('hidden');
}

function sendChat(rowId){
  const inp=document.getElementById('chat-input-'+rowId);
  if(!inp||!inp.value.trim())return;
  const msg=inp.value.trim();
  if(!DB.chats[rowId])DB.chats[rowId]=[];
  DB.chats[rowId].push({id:'c'+Date.now(),user:'J. Torres',avatar:'JT',color:'#2563eb',msg,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),mine:true});
  inp.value='';
  // Re-render chat
  const bom=DB.boms.find(b=>b.id===R.bomId);
  const row=findBOMRow(bom.rows,rowId);
  DB.sidePanelTab='chat';
  renderSidePanel(row,R.bomId);
  // Scroll to bottom
  setTimeout(()=>{const cm=document.getElementById('chat-msgs-'+rowId);if(cm)cm.scrollTop=cm.scrollHeight;},50);
}

function chatKeydown(e,rowId){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat(rowId);}
}

function toggleBOMExpand(id, e){
  e.stopPropagation();
  DB.bomExpanded[id]=DB.bomExpanded[id]===false?true:false;

}

// QC state
let _qcType='so';
function qcSetType(type){
  _qcType=type;
  ['so','po','rfq'].forEach(t=>{
    const btn=document.getElementById('qct-'+t);
    if(!btn)return;
    const colors={so:'var(--grn)',po:'var(--acc)',rfq:'var(--amb)'};
    const bgs={so:'var(--grn-light)',po:'var(--acc-light)',rfq:'var(--amb-light)'};
    const textColors={so:'var(--grn2)',po:'var(--acc2)',rfq:'var(--amb2)'};
    if(t===type){
      btn.style.border=`2px solid ${colors[t]}`;
      btn.style.background=bgs[t];
      btn.querySelector('div:nth-child(2)').style.color=textColors[t];
    } else {
      btn.style.border='2px solid var(--b2)';
      btn.style.background='var(--bg2)';
      btn.querySelector('div:nth-child(2)').style.color='var(--t2)';
    }
  });
  const titles={so:'New Sales Order',po:'New Purchase Order',rfq:'New RFQ'};
  document.getElementById('qc-form-title').textContent=titles[type];
  document.getElementById('qc-submit-btn').textContent='Create '+titles[type];
  const custOpts=DB.customers.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
  const vendOpts=DB.vendors.map(v=>`<option value="${v.name}">${v.name}</option>`).join('');
  const bomOpts=DB.boms.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  const projOpts=DB.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  const firstBom=DB.boms[0];
  const bomRowOpts=firstBom?flatBOMRows(firstBom.rows).map(r=>`<option value="${r.id}">${r.sku} — ${r.name}</option>`).join(''):'';
  document.getElementById('qc-form-body').innerHTML=renderQCForm(type,custOpts,vendOpts,bomOpts,projOpts,bomRowOpts);
}

function qcUpdateBOMRows(){
  const bomSel=document.getElementById('qc-bom');
  const projSel=document.getElementById('qc-proj');
  const rowSel=document.getElementById('qc-bomrow');
  if(!rowSel)return;
  // Resolve BOM id from project or direct selection
  let bomId=bomSel?bomSel.value:'';
  if(!bomId&&projSel&&projSel.value){
    const proj=DB.projects.find(p=>p.id===projSel.value);
    if(proj){bomId=proj.bomId;if(bomSel)bomSel.value=bomId;}
  }
  const bom=DB.boms.find(b=>b.id===bomId);
  rowSel.innerHTML=`<option value="">— Entire BOM / no specific item —</option>`
    +(bom?flatBOMRows(bom.rows).map(r=>`<option value="${r.id}">${r.sku} — ${r.name}</option>`).join(''):'');
}

function qcSubmit(){
  const projId=vv('qc-proj'), bomId=vv('qc-bom'), bomRowId=vv('qc-bomrow');
  // Find or use first project for attachment
  let proj=DB.projects.find(p=>p.id===projId);
  if(!proj&&projId){toast('Project not found','red');return;}
  const type=_qcType;
  const items=vv('qc-items');
  if(!items){toast('Description/items required','red');return;}

  if(type==='so'){
    const cust=vv('qc-cust');
    if(!cust){toast('Customer required','red');return;}
    const so={id:'SO-'+(2050+DB.projects.flatMap(p=>p.sos).length),customer:cust,items,total:parseFloat(vv('qc-total'))||0,date:vv('qc-date'),shipDate:vv('qc-ship'),status:vv('qc-status'),notes:vv('qc-freetext'),bomRowId};
    if(proj)proj.sos.push(so);
    else{if(!DB._standaloneSOs)DB._standaloneSOs=[];DB._standaloneSOs.push(so);}
    toast('SO created: '+so.id,'grn');
  } else if(type==='po'){
    const vend=vv('qc-vend');
    if(!vend){toast('Vendor required','red');return;}
    const po={id:'PO-'+(400+DB.projects.flatMap(p=>p.pos).length),vendor:vend,items,total:parseFloat(vv('qc-total'))||0,ordered:vv('qc-date'),expected:vv('qc-exp'),status:vv('qc-status'),bomRowId};
    if(proj)proj.pos.push(po);
    toast('PO created: '+po.id,'grn');
  } else if(type==='rfq'){
    const vends=vv('qc-vends');

function calcBOMCost(rows){
  return rows.reduce((a,r)=>a+(r.qty*r.cost)+calcBOMCost(r.children||[]),0);
}

function flatBOMRows(rows, level=0){
  const result=[];
  rows.forEach(r=>{
    result.push({...r,_level:level});
    if(r.children&&r.children.length)result.push(...flatBOMRows(r.children,level+1));
  });
  return result;
}

function findBOMRow(rows,id){
  for(const r of rows){if(r.id===id)return r;if(r.children){const f=findBOMRow(r.children,id);if(f)return f;}}return null;
}

function removeFromRows(rows,id){
  return rows.filter(r=>r.id!==id).map(r=>({...r,children:removeFromRows(r.children||[],id)}));
}

// ════════════════════════════════════════════════════
// MRP ENGINE — backwards scheduling from ship date
// ════════════════════════════════════════════════════

// Lead time string → days integer
function parseLead(lt){
  if(!lt) return 7;
  const n=parseInt(lt);
  if(isNaN(n)) return 7;
  if(lt.includes('w')) return n*7;
  if(lt.includes('m')) return n*30;
  return n;
}

function addDays(dateStr, days){
  if(!dateStr) return '';
  const d=new Date(dateStr);
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}

function daysDiff(a, b){
  // b - a in days (positive = b is later)
  if(!a||!b) return 0;
  return Math.round((new Date(b)-new Date(a))/(1000*86400));
}

function todayStr(){ return new Date().toISOString().split('T')[0]; }

// Run MRP across all projects — returns array of action items
function runMRP(){
  const today = todayStr();
  const actions = [];

  DB.projects.forEach(proj=>{
    if(!proj.bomId||!proj.dueDate) return;
    const bom = DB.boms.find(b=>b.id===proj.bomId);
    if(!bom) return;
    const shipDate = proj.dueDate;

    flatBOMRows(bom.rows).forEach(row=>{
      // Find vendor lead time from vendors master
      const vndRec = DB.vendors.find(v=>v.name===row.vendor);
      const leadDays = vndRec?parseLead(vndRec.leadTime):parseLead('14d');
      const orderByDate = addDays(shipDate, -leadDays);
      const daysUntilOrderBy = daysDiff(today, orderByDate);

      // Check if there's already a PO for this item
      const linkedPO = proj.pos.find(po=>po.bomRowId===row.id);
      const linkedRFQ = proj.rfqs.find(r=>r.bomRowId===row.id);

      let urgency='ok', actionType='none';

      if(!linkedPO){
        if(daysUntilOrderBy<0){
          urgency='critical'; actionType='order_now';
        } else if(daysUntilOrderBy<=3){
          urgency='urgent'; actionType='order_soon';
        } else if(daysUntilOrderBy<=7){
          urgency='warning'; actionType='plan_order';
        }
        // Check inventory — if enough on hand, no PO needed
        const skuRec = DB.skus.find(s=>s.id===row.skuId||s.sku===row.sku);
        const available = skuRec?(skuRec.onHand-skuRec.reserved):0;
        if(available>=row.qty){ urgency='ok'; actionType='in_stock'; }
      } else {
        // PO exists — check if it's overdue
        if(linkedPO.status==='Overdue') urgency='critical', actionType='po_overdue';
        else if(linkedPO.status==='In Transit'&&linkedPO.expected&&daysDiff(today,linkedPO.expected)<0) urgency='urgent', actionType='po_late';
        else urgency='ok'; actionType='po_on_track';
      }

      // Check in-house manufacture (MAKE parts)
      const isMake = row.partType&&(row.partType.includes('MAKE')||row.partType==='production');
      const makeLeadDays = 5; // default make time
      const makeByDate = addDays(shipDate, -makeLeadDays);
      const daysUntilMake = daysDiff(today, makeByDate);

      if(urgency!=='ok'||actionType==='none'){
        actions.push({
          id:`mrp-${proj.id}-${row.id}`,
          projId:proj.id, projName:proj.name,
          customer:proj.customer,
          rowId:row.id, sku:row.sku, item:row.name,
          qty:row.qty, uom:row.uom,
          vendor:row.vendor, leadDays,
          orderByDate, shipDate,
          daysUntilOrderBy,
          urgency, actionType,
          linkedPO:linkedPO||null,
          linkedRFQ:linkedRFQ||null,
          isMake,
          makeByDate: isMake?makeByDate:'',
          daysUntilMake: isMake?daysUntilMake:null,
          cost: row.qty*row.cost,
        });
      }
    });

    // Production tasks (in-house)
    (proj.tasks||[]).filter(t=>t.type==='production'&&t.status!=='Done'&&t.status!=='Cancelled').forEach(task=>{
      const daysLeft = daysDiff(today, task.endDate||proj.dueDate);
      let urgency='ok';
      if(daysLeft<0) urgency='critical';
      else if(daysLeft<=2) urgency='urgent';
      else if(daysLeft<=5) urgency='warning';
      if(urgency!=='ok'){
        actions.push({
          id:`prod-${proj.id}-${task.id}`,
          projId:proj.id, projName:proj.name,
          customer:proj.customer,
          rowId:'', sku:'', item:task.name,
          qty:1, uom:'',
          vendor:'In-House', leadDays:0,
          orderByDate:'', shipDate:proj.dueDate,
          daysUntilOrderBy:daysLeft,
          urgency, actionType:'make_now',
          linkedPO:null, linkedRFQ:null,
          isMake:true, makeByDate:task.endDate||'',
          daysUntilMake:daysLeft,
          cost:0, assignee:task.assignee,
        });
      }
    });
  });

  // Sort: critical first, then by days
  actions.sort((a,b)=>{
    const rank={critical:0,urgent:1,warning:2,ok:3};
    if(rank[a.urgency]!==rank[b.urgency]) return rank[a.urgency]-rank[b.urgency];
    return a.daysUntilOrderBy-b.daysUntilOrderBy;
  });
  return actions;
}

// Build a structured context object for AI
function buildMRPContext(){
  const actions = runMRP();
  const today = todayStr();
  return {
    today,
    projects: DB.projects.map(p=>({
      name:p.name, customer:p.customer, stage:p.stage,
      dueDate:p.dueDate, progress:p.progress, status:p.status,
      openPOs:p.pos.filter(po=>po.status!=='Received').length,
      openRFQs:p.rfqs.filter(r=>r.status==='Sent'||r.status==='Awaiting').length,
      soCount:p.sos.length,
    })),
    criticalActions: actions.filter(a=>a.urgency==='critical').map(a=>({
      project:a.projName, customer:a.customer, item:a.item, sku:a.sku,
      qty:a.qty, vendor:a.vendor, leadDays:a.leadDays,
      orderByDate:a.orderByDate, shipDate:a.shipDate,
      daysOverdue:-a.daysUntilOrderBy,
      actionType:a.actionType, poExists:!!a.linkedPO,
    })),
    urgentActions: actions.filter(a=>a.urgency==='urgent').map(a=>({
      project:a.projName, item:a.item, vendor:a.vendor,
      orderByDate:a.orderByDate, daysLeft:a.daysUntilOrderBy, actionType:a.actionType,
    })),
    warningActions: actions.filter(a=>a.urgency==='warning').map(a=>({
      project:a.projName, item:a.item, vendor:a.vendor, orderByDate:a.orderByDate,
    })),
    totalActions:actions.length,
    vendorLeadTimes: DB.vendors.reduce((o,v)=>({...o,[v.name]:v.leadTime}),{}),
  };
}

// ── MRP VIEW ─────────────────────────────────────────
function renderMRP(){
  const actions = runMRP();
  const today = todayStr();
  const critical = actions.filter(a=>a.urgency==='critical');
  const urgent = actions.filter(a=>a.urgency==='urgent');
  const warning = actions.filter(a=>a.urgency==='warning');

  function actionRow(a){
    const urgencyBadge = a.urgency==='critical'
      ?`<span class="badge br">🔴 Critical</span>`
      :a.urgency==='urgent'
      ?`<span class="badge ba">🟡 Urgent</span>`
      :`<span class="badge" style="background:var(--amb-light);color:var(--amb2)">⚠️ Plan</span>`;
    const actionLabel = {
      order_now:'Place PO Now',order_soon:'Place PO This Week',plan_order:'Schedule Order',
      po_overdue:'Follow Up PO',po_late:'Chase Delivery',make_now:'Start Production',
      po_on_track:'',in_stock:'In Stock',none:'',
    }[a.actionType]||a.actionType;
    const daysLabel = a.daysUntilOrderBy<0
      ?`<span style="color:var(--red);font-weight:700">${Math.abs(a.daysUntilOrderBy)}d overdue</span>`
      :`<span style="color:${a.daysUntilOrderBy<=3?'var(--red)':a.daysUntilOrderBy<=7?'var(--amb)':'var(--grn)'};font-weight:700">${a.daysUntilOrderBy}d left</span>`;
    return `<tr class="trow">
      <td>${urgencyBadge}</td>
      <td><div style="font-weight:600;font-size:12px">${a.projName}</div><div style="font-size:10px;color:var(--t3)">${a.customer}</div></td>
      <td><div style="font-weight:500">${a.item}</div>${a.sku?`<div style="font-size:10px;font-family:var(--mono);color:var(--t3)">${a.sku}</div>`:''}</td>
      <td class="mono">${a.qty} ${a.uom}</td>
      <td style="font-size:12px">${a.isMake?'🏭 In-House':a.vendor}</td>
      <td class="mono">${a.isMake?a.leadDays+'d make':a.leadDays+'d lead'}</td>
      <td class="mono" style="font-size:11px">${a.orderByDate||a.makeByDate||'—'}</td>
      <td class="mono" style="font-size:11px">${a.shipDate}</td>
      <td>${daysLabel}</td>
      <td>${a.linkedPO?`<span class="tag">${a.linkedPO.id}</span> ${poBadge(a.linkedPO.status)}`:'<span style="color:var(--t4);font-size:11px">No PO</span>'}</td>
      <td style="white-space:nowrap">
        ${!a.linkedPO&&!a.isMake?`<button class="btn btn-xs btn-primary" onclick="quickPOFromRow('${a.projId}','${a.rowId}','${a.projId}')">+ PO</button>`:''}
        ${!a.linkedPO&&!a.isMake?`<button class="btn btn-xs" style="background:var(--amb-light);color:var(--amb2);border:1px solid var(--amb-mid)" onclick="quickRFQFromRow('${a.projId}','${a.rowId}','${a.projId}')">RFQ</button>`:''}
        ${a.isMake?`<button class="btn btn-xs btn-green" onclick="nav('project',{projectId:'${a.projId}'})">View</button>`:''}
        ${a.linkedPO&&a.actionType==='po_overdue'?`<button class="btn btn-xs btn-danger" onclick="editPO('${a.projId}','${a.linkedPO.id}')">Follow Up</button>`:''}
      </td>
    </tr>`;
  }

  return `<div style="padding:0;overflow-y:auto;height:100%">
    <div class="kpi-grid kpi-4" style="margin-bottom:0">
      <div class="kpi red"><div class="kpi-label">🔴 Critical</div><div class="kpi-val" style="color:var(--red)">${critical.length}</div><div class="kpi-sub dn">Order now or delayed</div></div>
      <div class="kpi amb"><div class="kpi-label">🟡 Urgent</div><div class="kpi-val" style="color:var(--amb)">${urgent.length}</div><div class="kpi-sub">Order within 3 days</div></div>
      <div class="kpi acc"><div class="kpi-label">⚠️ Plan</div><div class="kpi-val" style="color:var(--acc)">${warning.length}</div><div class="kpi-sub">Order within 1 week</div></div>
      <div class="kpi grn"><div class="kpi-label">✅ Total Items Tracked</div><div class="kpi-val" style="color:var(--grn)">${actions.length}</div><div class="kpi-sub up">Across ${DB.projects.length} projects</div></div>
    </div>

    ${critical.length?`<div style="padding:16px 20px 0">
      <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span> Critical — Act Today

      </div>

    ${urgent.length?`<div style="padding:14px 20px 0">
      <div style="font-size:11px;font-weight:700;color:var(--amb);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--amb);display:inline-block"></span> Urgent — Order This Week

          <tbody>${urgent.map(actionRow).join('')}</tbody>
        </table></div>
      </div>
    </div>`:''}

    ${warning.length?`<div style="padding:14px 20px 0">
      <div style="font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--acc);display:inline-block"></span> Plan — Order Next Week
      </div>
      <div class="card" style="padding:0">
        <div class="tbl-wrap"><table>
          <thead><tr><th>Priority</th><th>Project</th><th>Item</th><th>Qty</th><th>Vendor</th><th>Lead</th><th>Order By</th><th>Ship Date</th><th>Time Left</th><th>PO Status</th><th>Actions</th></tr></thead>
          <tbody>${warning.map(actionRow).join('')}</tbody>
        </table></div>
      </div>
    </div>`:''}

    ${!actions.length?`<div class="empty" style="flex:1;margin-top:40px"><div class="empty-icon">✅</div><div class="empty-txt" style="font-size:14px;color:var(--grn)">All projects are on track — nothing critical today.</div></div>`:''}
    <div style="height:24px"></div>
  </div>`;
}

async function renderAIBriefing(){
  const ctx = buildMRPContext();
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  const systemPrompt = `You are an operations AI assistant for a manufacturing company. You receive structured data about their projects, BOMs, purchase orders, and procurement schedule. Your job is to generate a clear, actionable daily briefing for the entire operations team.

Format your response as structured HTML using these exact tags:
- <briefing-section title="..."> for each section
- <action-item urgency="critical|urgent|info"> for action items
- <insight> for observations and recommendations

Be specific: use actual project names, item names, vendor names, dates, and quantities from the data. Sound like a knowledgeable operations manager briefing their team, not a generic AI. Be direct and concise.`;

  const userPrompt = `Today is ${today}. Here is the current state of our manufacturing operations:

${JSON.stringify(ctx, null, 2)}

Generate a daily operations briefing covering:
1. Executive summary (2-3 sentences on overall health)
2. Critical actions for today (anything overdue or urgent)
3. What to order this week and from which vendors
4. Production/manufacturing priorities  
5. Risk flags and recommendations
6. A "Today's Checklist" of 5-8 specific numbered action items for the team

Use the actual data provided. Be specific with item names, quantities, vendors, and deadlines.`;

  const c = document.getElementById('main-content');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1500,
        messages:[{role:'user',content:[
          {type:'text',text:systemPrompt+'\n\n'+userPrompt}
        ]}]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '';

    c.innerHTML = `
    <div style="overflow-y:auto;height:100%;background:var(--bg)">
      <div style="background:linear-gradient(135deg,#1e1b4b,#312e81,#1e2d3d);padding:28px;color:#fff">
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px">🤖 AI Operations Briefing</div>
        <div style="font-size:22px;font-weight:700;letter-spacing:-.5px">${today}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px">Powered by Claude · Auto-generated from live project data</div>
      </div>
      <div style="padding:24px;max-width:900px;margin:0 auto" id="ai-briefing-body">
        ${renderBriefingHTML(raw, ctx)}
      </div>
      <div style="padding:0 24px 24px;max-width:900px;margin:0 auto">
        <div style="background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px 16px;font-size:11px;color:var(--t3)">
          ℹ️ This briefing is auto-generated from your live project data. Always verify before placing orders. Refresh the page to regenerate.
        </div>
      </div>
    </div>`;
  } catch(err) {
    // Fallback: generate briefing from MRP data locally without AI
    c.innerHTML = renderFallbackBriefing(ctx, today, err.message);
  }
}

function renderBriefingHTML(raw, ctx){
  // Parse the AI response into nice cards
  // The AI may return plain text or structured text — handle both gracefully
  const paragraphs = raw.split('\n\n').filter(p=>p.trim());

  let html = '';
  let inChecklist = false;

  paragraphs.forEach(para=>{
    const trimmed = para.trim();
    if(!trimmed) return;

    // Detect headers
    if(trimmed.match(/^#+\s/) || trimmed.match(/^\d+\.\s+[A-Z]/)){
      const headerText = trimmed.replace(/^#+\s*/,'').replace(/^\d+\.\s*/,'');
      if(inChecklist){ html+='</div>'; inChecklist=false; }
      html+=`<div class="card" style="margin-bottom:14px">
        <div class="card-hd"><span class="card-title">${headerText}</span></div>
        <div class="card-body" id="section-${Date.now()}">`;
      // Will be closed by next header or end
      return;
    }

    // Detect checklist items
    if(trimmed.match(/^[\-\*•]\s/) || trimmed.match(/^\d+\)\s/)){
      if(!inChecklist){
        html+=`<div style="display:flex;flex-direction:column;gap:8px;padding:4px 0">`;
        inChecklist=true;
      }
      const itemText=trimmed.replace(/^[\-\*•\d\)\.]+\s*/,'');
      const isUrgent=itemText.toLowerCase().includes('critical')||itemText.toLowerCase().includes('immediately')||itemText.toLowerCase().includes('overdue');
      const isWarning=itemText.toLowerCase().includes('urgent')||itemText.toLowerCase().includes('today');
      html+=`<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 12px;border-radius:var(--r);background:${isUrgent?'var(--red-light)':isWarning?'var(--amb-light)':'var(--bg3)'}">
        <span style="font-size:14px;flex-shrink:0">${isUrgent?'🔴':isWarning?'🟡':'✅'}</span>
        <span style="font-size:12px;color:var(--t1);line-height:1.5">${itemText}</span>
      </div>`;
      return;
    }

    if(inChecklist){ html+='</div>'; inChecklist=false; }
    html+=`<p style="font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:10px">${trimmed.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')}</p>`;
  });

  if(inChecklist) html+='</div>';
  // Close any open card
  html+='</div></div>';

  // If raw parsing produced nothing useful, show the raw text nicely
  if(!html.includes('<div class="card"')){
    html=`<div class="card"><div class="card-body"><div style="font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-wrap">${raw}</div></div></div>`;
  }

  return html;
}
